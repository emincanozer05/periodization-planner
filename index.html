/* =========================================================
   ATHLETE RECOMMENDATIONS — per-athlete, evidence-based AI advice
   built from the athlete's body composition, fatigue/wellness and
   test results. Uses the same provider/API key the coach already set
   for the AI Coach assistant (data.ai). Result is stored on the
   athlete record (ath.recommend) so it persists & syncs.
   ========================================================= */
const ATH_REC_SYSTEM=`Sen, elit bir kuvvet & kondisyon ve spor performans uzmanısın. Sana TEK bir sporcunun güncel profili (vücut kompozisyonu, yorgunluk/hazır bulunuşluk verileri, yük/ACWR ve test sonuçları) verilecek. Görevin bu sporcuya ÖZEL, uygulanabilir, kanıta dayalı bir antrenman önerisi hazırlamak.

Çıktını TAM OLARAK şu Markdown başlıklarıyla ve Türkçe ver:
## Genel Değerlendirme
2-4 cümlede sporcunun mevcut durumu (güçlü yanlar + risk/zayıf alanlar).
## Yüklenme Önerisi
ACWR, hazır bulunuşluk ve yorgunluğa göre yükü ARTIR / KORU / AZALT diye öner; somut haftalık AU hedef aralığı ve mikro dağılım (yoğun/hafif gün) ver.
## Yapması Gereken Çalışmalar
Madde madde; test ve vücut kompozisyonu eksiklerine yönelik egzersiz tipleri ve mümkünse "EGZERSİZ KÜTÜPHANESİ"nden somut egzersiz adları, set×tekrar ve şiddet (%1RM/RPE) ile.
## Kaçınması / Dikkat Etmesi Gerekenler
Yorgunluk, asimetri (ankle DF / ASLR / OHS), sakatlık geçmişi veya yüksek ACWR'ye göre kaçınılması ya da dikkatle yapılması gereken çalışmalar.
## İzleme & Yeniden Test
Önümüzdeki haftalarda neyi takip etmeli, ne zaman yeniden test edilmeli.

Kurallar:
- SADECE verilen verilere dayan. Eksik veri varsa "veri yok/eksik" diye belirt; ASLA test değeri veya ölçüm uydurma.
- Somut sayılar kullan (set×tekrar, %1RM/RPE, dinlenme, haftalık AU).
- ACWR 0.8–1.3 optimal, >1.5 yüksek yaralanma riski; hazır bulunuşluk <3/5 ve yorgunluk yüksekse yükü azalt.
- Asimetri >%10 (örn. ayak bileği dorsifleksiyon) veya ASLR/OHS düşük skor ise mobilite/stabilite ve tek taraflı (unilateral) çalışmayı önceliklendir.
- Kısa, net, madde işaretli yaz. Kesin tıbbi teşhis koyma; gerekirse sağlık ekibine yönlendir.`;

function recNum(v){return v!==''&&v!=null&&!isNaN(Number(v))?Number(v):null;}
function buildAthleteSnapshot(ath,setup,exercises){
  const out=[];
  const age=ath.dateOfBirth?(()=>{const b=parseD(ath.dateOfBirth);const t=new Date();let y=t.getFullYear()-b.getFullYear();if(t<new Date(t.getFullYear(),b.getMonth(),b.getDate()))y--;return y;})():null;
  out.push(`SPORCU: ${ath.name||'—'}${ath.number?` (#${ath.number})`:''}`);
  out.push(`Pozisyon: ${POS_FULL[ath.position]||ath.position||'—'} | Yaş: ${age??'—'} | Spor: ${setup.sport||'—'}`);
  out.push(`Bugün: ${fmt(today)}`);
  // Body composition (latest + change vs previous)
  const ms=[...(ath.measurements||[])].filter(m=>m.date).sort((a,b)=>a.date.localeCompare(b.date));
  out.push('\n=== VÜCUT KOMPOZİSYONU ===');
  if(ms.length){
    const cur=ms[ms.length-1],prev=ms[ms.length-2];
    const line=(k,lbl,u)=>{const c=recNum(cur[k]);if(c==null)return null;const p=prev?recNum(prev[k]):null;const d=p!=null?` (Δ ${(c-p>=0?'+':'')+(c-p).toFixed(1)})`:'';return `${lbl}: ${c}${u||''}${d}`;};
    const parts=[line('height','Boy','cm'),line('weight','Kilo','kg'),line('bodyFat','Yağ','%'),line('wingspan','Kulaç','cm')].filter(Boolean);
    out.push(`Son ölçüm (${cur.date}): ${parts.join(' | ')||'—'}`);
    const h=recNum(cur.height),w=recNum(cur.weight);if(h&&w)out.push(`BMI: ${(w/((h/100)**2)).toFixed(1)}`);
    if(ms.length>1)out.push(`Toplam ${ms.length} ölçüm var (ilk: ${ms[0].date}).`);
  } else out.push('Vücut kompozisyonu verisi yok.');
  // Wellness / fatigue (last 14 days averages + latest)
  out.push('\n=== YORGUNLUK / HAZIR BULUNUŞLUK (son 14 gün) ===');
  const ref=athLatestDate(ath);
  const recent=(ath.wellness||[]).filter(w=>w.date&&w.date>=fmt(addD(parseD(ref),-13))&&w.date<=ref);
  if(recent.length){
    const avg=f=>{const v=recent.map(w=>recNum(w[f])).filter(x=>x!=null);return v.length?(v.reduce((a,b)=>a+b,0)/v.length):null;};
    const fmtA=(f,u)=>{const a=avg(f);return a!=null?a.toFixed(1)+(u||''):'—';};
    out.push(`Ortalama → Hazır bulunuşluk: ${fmtA('readiness','/5')} | Yorgunluk: ${fmtA('fatigue','/5')} | Ağrı: ${fmtA('soreness','/5')} | Uyku: ${fmtA('sleep')} | RHR: ${fmtA('RHR','bpm')}`);
    const last=[...recent].sort((a,b)=>a.date.localeCompare(b.date)).pop();
    out.push(`Son check-in (${last.date}): Hazırlık ${last.readiness??'—'}/5, Yorgunluk ${last.fatigue??'—'}/5, Ağrı ${last.soreness??'—'}/5${last.areaOfPain?`, Ağrı bölgesi: ${last.areaOfPain}`:''} (${recent.length} check-in)`);
  } else out.push('Son 14 günde wellness verisi yok.');
  // Load / ACWR
  out.push('\n=== YÜK / ACWR ===');
  const l7=athLoadSum(ath,fmt(addD(parseD(ref),-6)),ref);const acwr=athACWR(ath,ref);const z=acwrZoneOf(acwr);
  out.push(`Son 7 gün yük: ${l7} AU | ACWR: ${acwr?acwr.toFixed(2):'—'} (${z.t})`);
  // Injuries
  const inj=(ath.injuries||[]).filter(i=>i.status&&i.status!=='Recovered');
  out.push('\n=== SAKATLIK ===');
  out.push(inj.length?inj.map(i=>`- ${i.type||i.area||'Sakatlık'}${i.area&&i.type?` (${i.area})`:''} — durum: ${i.status}${i.date?`, ${i.date}`:''}`).join('\n'):'Aktif sakatlık yok.');
  // Latest test
  out.push('\n=== SON TEST SONUÇLARI ===');
  const ts=[...(ath.tests||[])].filter(t=>t.date).sort((a,b)=>a.date.localeCompare(b.date));
  if(ts.length){
    const t=ts[ts.length-1];
    out.push(`Tarih: ${t.date}${t.period?` (${(TEST_PERIODS.find(p=>p.id===t.period)||{}).label||t.period})`:''}`);
    const add=(lbl,v,u)=>{const n=recNum(v);if(n!=null)out.push(`- ${lbl}: ${n}${u||''}`);};
    add('Dikey sıçrama',t.verticalJump,' cm');add('CMJ',t.cmj,' cm');add('Drop Jump (RSI)',t.dropJump);add('Yatay sıçrama',t.horizontalJump,' cm');
    add('20m sprint',t.sprint20m&&t.sprint20m.time,' s');add('T-Test çeviklik',t.tTest,' s');add('Shuttle/dayanıklılık',t.shuttleRun,' s');
    add('Boy',t.height,' cm');add('Kilo',t.weight,' kg');add('Yağ',t.bodyFat,' %');add('Kulaç',t.wingspan,' cm');
    const adfR=recNum(t.ankleDF&&t.ankleDF.right),adfL=recNum(t.ankleDF&&t.ankleDF.left);
    if(adfR!=null||adfL!=null){const diff=(adfR!=null&&adfL!=null)?Math.abs(adfR-adfL).toFixed(1):'—';out.push(`- Ayak bileği dorsifleksiyon: R ${adfR??'—'}° / L ${adfL??'—'}° (fark ${diff}°)`);}
    const asR=recNum(t.aslr&&t.aslr.right),asL=recNum(t.aslr&&t.aslr.left);
    if(asR!=null||asL!=null)out.push(`- ASLR (FMS 0-3): R ${asR??'—'} / L ${asL??'—'}`);
    if(t.ohs&&t.ohs.score!==''&&t.ohs.score!=null)out.push(`- Overhead Squat (FMS 0-3): ${t.ohs.score}${(t.ohs.problems||[]).filter(Boolean).length?` — sorunlar: ${(t.ohs.problems||[]).filter(Boolean).join('; ')}`:''}`);
    const circ=t.circ||{};const ca=[];const cl=(k,lbl)=>{const n=recNum(circ[k]);if(n!=null)ca.push(`${lbl} ${n}`);};
    cl('shoulder','Omuz');cl('waist','Bel');cl('hip','Kalça');cl('thighRight','Uyluk R');cl('thighLeft','Uyluk L');cl('calfRight','Baldır R');cl('calfLeft','Baldır L');
    if(ca.length)out.push(`- Çevre ölçümleri (cm): ${ca.join(', ')}`);
    if(t.posture&&t.posture.observations)out.push(`- Postür notları: ${t.posture.observations}`);
    if(t.notes)out.push(`- Genel notlar: ${t.notes}`);
    if(ts.length>1)out.push(`(Toplam ${ts.length} test; bir önceki: ${ts[ts.length-2].date})`);
  } else out.push('Test verisi yok.');
  // Exercise library so the model can recommend the coach's own exercises
  const exs=exercises||[];
  if(exs.length){
    out.push('\n=== EGZERSİZ KÜTÜPHANESİ (öneriler buradan seçilebilir) ===');
    const byType={};exs.forEach(e=>{const ty=e.type||'Diğer';(byType[ty]=byType[ty]||[]).push((e.name||'?')+(e.difficulty?` (${e.difficulty})`:''));});
    Object.entries(byType).forEach(([ty,n])=>{const sh=n.slice(0,30);out.push(`- ${ty}: ${sh.join(', ')}${n.length>sh.length?' …':''}`);});
  }
  let txt=out.join('\n');if(txt.length>28000)txt=txt.slice(0,28000)+'\n…(kısaltıldı)';return txt;
}
// Minimal Markdown → HTML for rendering the recommendation nicely.
function recMd(src){
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inline=s=>esc(s).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>');
  const lines=(src||'').replace(/\r/g,'').split('\n');let html='',list=null;
  const closeList=()=>{if(list){html+=`</${list}>`;list=null;}};
  for(const ln of lines){
    const t=ln.trim();
    if(!t){closeList();continue;}
    let m;
    if(m=t.match(/^#{1,3}\s+(.*)/)){closeList();html+=`<h3>${inline(m[1])}</h3>`;continue;}
    if(m=t.match(/^#{4,6}\s+(.*)/)){closeList();html+=`<h4>${inline(m[1])}</h4>`;continue;}
    if(m=t.match(/^[-*•]\s+(.*)/)){if(list!=='ul'){closeList();list='ul';html+='<ul>';}html+=`<li>${inline(m[1])}</li>`;continue;}
    if(m=t.match(/^\d+[.)]\s+(.*)/)){if(list!=='ol'){closeList();list='ol';html+='<ol>';}html+=`<li>${inline(m[1])}</li>`;continue;}
    closeList();html+=`<p>${inline(t)}</p>`;
  }
  closeList();return html;
}

// Animated number that eases from 0 → value on mount/change (cubic ease-out).
function CountUp({value,decimals=0,dur=850,format}){
  const[v,setV]=useState(0);
  const raf=useRef(0);
  useEffect(()=>{
    const target=Number(value)||0;let start=0;
    const tick=ts=>{if(!start)start=ts;const p=Math.min(1,(ts-start)/dur);const e=1-Math.pow(1-p,3);setV(target*e);if(p<1)raf.current=requestAnimationFrame(tick);};
    raf.current=requestAnimationFrame(tick);
    // Fallback: guarantee the final value lands even if rAF is paused (bg tab).
    const done=setTimeout(()=>setV(target),dur+80);
    return()=>{cancelAnimationFrame(raf.current);clearTimeout(done);};
  },[value,dur]);
  return<span className="countup">{format?format(v):v.toFixed(decimals)}</span>;
}

          <h2 style={{margin:0}}>sRPE Log <span style={{fontSize:11,color:'var(--muted)',fontWeight:400}}>session-RPE by source · sRPE load (AU) above each bar</span></h2>

        {(ath.srpeLog||[]).length===0&&<div className="empty-st">No sRPE data yet — sync from Tally or add manually</div>}
        {(ath.srpeLog||[]).length>0&&(()=>{
          const days7=Array.from({length:7},(_,i)=>fmt(addD(parseD(srpeWeek),i)));
          // Aggregate ALL entries per date. A single day can hold several sessions (e.g. an
          // S&C session AND a Ball Practice session), each its own srpeLog row. The old
          // Object.fromEntries(date→entry) kept only the LAST row per date, so a second
          // same-day session (the S&C manual RPE) silently disappeared from the chart.
          const agg={};
          (ath.srpeLog||[]).forEach(s=>{
            if(!s||!s.date)return;
            const a=agg[s.date]||(agg[s.date]={tpLoad:0,scLoad:0,gmLoad:0,tpRW:0,tpDW:0,scRW:0,scDW:0,gmRW:0,gmDW:0});
            const add=(P,load,rpe,dur)=>{a[P+'Load']+=Number(load)||0;const r=(rpe===''||rpe==null)?null:Number(rpe);const du=Number(dur)||0;if(r!=null&&!isNaN(r)&&du>0){a[P+'RW']+=r*du;a[P+'DW']+=du;}};
            add('tp',s.tpLoad,s.tpRPE,s.tpDuration);
            add('sc',s.scLoad,s.scRPE,s.scDuration);
            add('gm',s.gameLoad,s.gameRPE,s.gameDuration);
          });
          const labels=days7.map((d,i)=>`${DN[i]} ${fd(d).slice(0,5)}`);
          const tpVals=days7.map(d=>agg[d]?.tpLoad||0);
          const scVals=days7.map(d=>agg[d]?.scLoad||0);
          const gmVals=days7.map(d=>agg[d]?.gmLoad||0);
          // Segment RPE = duration-weighted average across that day's sessions in that category
          // (for a single session this is exactly its own RPE).
          const wAvg=(d,P)=>agg[d]&&agg[d][P+'DW']>0?agg[d][P+'RW']/agg[d][P+'DW']:null;
          const tpRPEs=days7.map(d=>wAvg(d,'tp'));
          const scRPEs=days7.map(d=>wAvg(d,'sc'));
          const gmRPEs=days7.map(d=>wAvg(d,'gm'));
          const weekTotal=tpVals.reduce((a,b)=>a+b,0)+scVals.reduce((a,b)=>a+b,0)+gmVals.reduce((a,b)=>a+b,0);
          const dailyTotals=days7.map((d,i)=>tpVals[i]+scVals[i]+gmVals[i]);
          const activeDays=dailyTotals.filter(v=>v>0).length;
          const cumAU=Math.round(weekTotal);
          const avgAU=activeDays?Math.round(weekTotal/activeDays):0;
          const peakAU=Math.round(Math.max(0,...tpVals,...scVals,...gmVals));
          const rpeByDs=[tpRPEs,scRPEs,gmRPEs];
          const SRC_LABELS=['Team Practice','S&C','Game'];
          const fmtRPE=x=>x==null?'':(Number(x)%1===0?String(Number(x)):Number(x).toFixed(1));
          // Real session titles for the hover tooltip — matched from the athlete's calendar
          // by date + source category (tp / sc / gm), so a bar segment shows the actual
          // session name(s) (e.g. "Temel Kuvvet & Güç", "Recovery Session"). Falls back to

                  tooltip:{enabled:true,mode:'nearest',intersect:true,backgroundColor:'rgba(18,20,25,.94)',borderColor:'rgba(255,255,255,.14)',borderWidth:1,cornerRadius:10,padding:{top:9,bottom:9,left:12,right:12},displayColors:true,boxPadding:5,caretSize:6,titleColor:'#eef1f5',bodyColor:'#cdd3dc',footerColor:'#8b94a3',titleFont:{family:'Space Grotesk',size:13,weight:'700'},bodyFont:{family:'IBM Plex Mono',size:12},footerFont:{family:'IBM Plex Mono',size:10,weight:'400'},
                    callbacks:{labelColor:ctx=>({backgroundColor:ctx.dataset.solidColor,borderColor:ctx.dataset.solidColor,borderWidth:0,borderRadius:3}),

      const sessCount=(s,e)=>Object.entries(ath.days||{}).filter(([k])=>k>=s&&k<=e).reduce((t,[,d])=>t+(d.sessions||[]).length,0);
      const wkLoad=Math.round(sumLoad(wkS,wkE));const prevLoad=Math.round(sumLoad(prevS,prevE));const loadDelta=wkLoad-prevLoad;
      const wkRPE=avgRPE(wkS,wkE);const wkDur=sumDur(wkS,wkE);

      const m4start=fmt(addD(parseD(wkS),-21));const m4end=wkE;

      const mReady=(ath.wellness||[]).filter(w=>w.date>=m4start&&w.date<=m4end&&w.readiness!==''&&w.readiness!=null).map(w=>Number(w.readiness));
      const avgReady=mReady.length?(mReady.reduce((a,b)=>a+b,0)/mReady.length):null;
      const mRHR=(ath.wellness||[]).filter(w=>w.date>=m4start&&w.date<=m4end&&w.RHR!==''&&w.RHR!=null).map(w=>Number(w.RHR));
      const avgRHR=mRHR.length?(mRHR.reduce((a,b)=>a+b,0)/mRHR.length):null;
      return(<div>

          <div className="ath-stat-row" style={{marginBottom:0}}>

            <div className="ath-stat"><div className="k">Volume</div><div className="v">{wkDur}<span className="u">min</span></div><div className="sub">total session time</div></div>
            <div className="ath-stat"><div className="k">Readiness</div><div className="v">{wkReadiness!=null?wkReadiness.toFixed(1):'—'}</div><div className="sub">/ 10</div></div>
          </div>

        <div className="panel">

          <div className="ath-stat-row" style={{marginBottom:0}}>

function Athletes({team,updateTeam,weeks,ai,exercises}){

  const save=a=>updateTeam(team.id,{athletes:a});
  const addAth=()=>{const a={id:uid(),name:'New Athlete',number:'',position:(POSITIONS[team.setup.sport]||POSITIONS.default)[0],
    dateOfBirth:'',height:'',weight:'',phone:'',photo:null,notes:'',injuries:[],measurements:[],wellness:[],srpeLog:[],tests:[],days:{}};save([...athletes,a]);setSel(a.id);};
  const updAth=(id,upd)=>save(athletes.map(a=>a.id===id?{...a,...upd}:a));
  const delAth=id=>{if(!confirm('Delete this athlete and all their data?'))return;save(athletes.filter(a=>a.id!==id));if(sel===id)setSel(null);};
  const ageOf=a=>{if(!a.dateOfBirth)return null;const b=parseD(a.dateOfBirth);const t=new Date();let y=t.getFullYear()-b.getFullYear();if(t<new Date(t.getFullYear(),b.getMonth(),b.getDate()))y--;return y;};
  const totalAU=a=>Object.values(a.days||{}).reduce((s,d)=>s+(d.sessions||[]).reduce((x,ses)=>x+Number(ses.au||0),0),0);
  const isInjured=a=>(a.injuries||[]).some(i=>i.status!=='Recovered');
  const initials=name=>(name||'').trim().split(/\s+/).slice(0,2).map(p=>p[0]||'').join('').toUpperCase()||'?';
  const positions=POSITIONS[team.setup.sport]||POSITIONS.default;
  const list=athletes.filter(a=>{
    if(filter!=='all'&&(a.position||'')!==filter)return false;
    if(!q)return true;
    const s=q.toLowerCase();
    return(a.name||'').toLowerCase().includes(s)||(a.position||'').toLowerCase().includes(s)||String(a.number||'').includes(s);
  });
  if(sel){const ath=athletes.find(a=>a.id===sel);
    if(!ath)return<div className="panel"><button className="btn sec" onClick={()=>setSel(null)}>← Back</button><p>Athlete not found</p></div>;
    return<AthleteDetail key={ath.id} ath={ath} onBack={()=>setSel(null)} updAth={updAth} setup={team.setup} weeks={weeks} ai={ai} exercises={exercises}/>;}
  return(<div>
    <div className="rost-head">
      <div>
        <div className="rh-t">Roster</div>
        <div className="rh-s">{athletes.length} athletes · {team.setup.teamName}</div>
      </div>
      <div className="rost-tools">
        <div className="ath-search"><span className="ic">⌕</span><input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search athlete…"/></div>
        <div className="ath-seg">
          <button className={filter==='all'?'on':''} onClick={()=>setFilter('all')}>All</button>
          {positions.map(p=><button key={p} className={filter===p?'on':''} onClick={()=>setFilter(p)}>{p}</button>)}
        </div>
        <button className="btn sec sm" onClick={addAth}>+ Add</button>
      </div>
    </div>
    {athletes.length===0&&<div className="empty-st">No athletes yet — click "+ Add" to start.</div>}
    {athletes.length>0&&list.length===0&&<div className="empty-st">No matches.</div>}
    <div className="rost-grid">{list.map(a=>{
      const age=ageOf(a);const ref=athLatestDate(a);
      const l7=athLoadSum(a,fmt(addD(parseD(ref),-6)),ref);
      const rd=athWellnessVal(a,'readiness',ref);
      const acwr=athACWR(a,ref);const az=acwrZoneOf(acwr);
      const rcls=rd==null?'na':rd>=4?'':rd>=3?'warn':'bad';
      const posFull=POS_FULL[a.position]||a.position||'—';
      return(<div key={a.id} className="rc" onClick={()=>setSel(a.id)}>
        <button className="rc-del" title="Sporcuyu sil" onClick={e=>{e.stopPropagation();delAth(a.id);}}>✕</button>
        <div className="rc-num">{a.number||''}</div>
        <div className="rc-top">
          <div className={`rc-av ${rcls}`}>{a.photo?<img src={a.photo} alt=""/>:initials(a.name)}</div>
          <div className="rc-id">
            <div className="rc-name">{a.name}</div>
            <div className="rc-pos">{posFull}{age!=null?` · ${age} yrs`:''}</div>
          </div>
        </div>
        <div className="rc-stats">
          <div className="rc-st"><span className="k">Readiness</span><span className="v" style={{color:readyColor(rd)}}>{rd!=null?rd.toFixed(1):'—'}<small>/5</small></span></div>
          <div className="rc-st"><span className="k">ACWR</span><span className="v" style={{color:az.c}}>{acwr?acwr.toFixed(2):'—'}</span></div>
          <div className="rc-st"><span className="k">7d load</span><span className="v" style={{color:'#3b6ef5'}}>{l7?l7.toLocaleString('en-US').replace(/,/g,'.'):'—'}</span></div>
        </div>

    })}</div>

/* =========================================================
   TALLY / FORM SYNC
   Pulls sRPE + Wellness submissions from a Cloudflare Worker
   (which reads the Tally forms) and merges them into the team.
   ========================================================= */
const NORM=s=>(s||'').toString().trim().toUpperCase().replace(/\s+/g,' ');

async function performTallySync(workerUrl,team,opts={}){
  const autoCreate=!!opts.autoCreate;
  const base=workerUrl.replace(/\/+$/,'');
  // Guard against the most common mistakes before we even fetch.
  if(/tally\.so/i.test(base))
    throw new Error('Bu bir Tally linki — buraya Cloudflare Worker adresini (…workers.dev) yapıştırman gerekiyor, Tally form linkini değil.');
  if(!/^https?:\/\//i.test(base))
    throw new Error('Worker URL "https://" ile başlamalı (ör. https://tally-sync.ADIN.workers.dev).');
  let r;
  try{
    r=await fetch(base+'/sync');
  }catch(e){
    throw new Error('Worker\'a ulaşılamadı ("Failed to fetch"). Olası sebepler: URL yanlış ya da Worker yayında değil · Worker CORS başlığı döndürmüyor (verdiğim tally-worker.js bunu içeriyor) · internet yok. Test: tarayıcıda '+base+'/sync adresini aç — JSON görmüyorsan sorun Worker tarafında.');
  }
  if(!r.ok)throw new Error(`Worker HTTP ${r.status} döndürdü. Tarayıcıda ${base}/sync adresini açıp dönen mesaja bak.`);
  const data=await r.json();
  if(data.error)throw new Error('Worker hatası: '+data.error+' — genelde TALLY_API_KEY eksik ya da form ID (SRPE_FORM / WELLNESS_FORM) yanlış demektir.');
  const sRPE=data.sRPE||[],wellness=data.wellness||[];

  let athletes=(team.athletes||[]).map(a=>({...a,
    days:JSON.parse(JSON.stringify(a.days||{})),
    wellness:[...(a.wellness||[])],
    measurements:[...(a.measurements||[])],
    injuries:[...(a.injuries||[])],
    srpeLog:[...(a.srpeLog||[])],
  }));
  const stats={sRPERows:sRPE.length,wellnessRows:wellness.length,srpeAdded:0,srpeUpdated:0,
    wellnessAdded:0,wellnessUpdated:0,athletesCreated:0,skipped:0,athletesMatched:new Set(),namesSeen:new Set(),skippedNames:new Set()};

  const findIdx=n=>athletes.findIndex(a=>NORM(a.name)===NORM(n));
  // Match an existing athlete by name. New names are auto-created ONLY if the coach
  // enabled it; otherwise the submission is skipped (and reported) so the roster
  // never fills up with typos/test names.
  const getOrMatch=name=>{
    stats.namesSeen.add((name||'').trim());
    let i=findIdx(name);
    if(i===-1){
      if(!autoCreate){stats.skipped++;stats.skippedNames.add((name||'').trim());return null;}
      athletes.push({id:uid(),name:name.trim(),number:'',
        position:(POSITIONS[team.setup.sport]||POSITIONS.default)[0],
        dateOfBirth:'',height:'',weight:'',phone:'',photo:null,notes:'',
        injuries:[],measurements:[],wellness:[],srpeLog:[],tests:[],days:{}});
      i=athletes.length-1;stats.athletesCreated++;
    } else stats.athletesMatched.add(i);
    return athletes[i];
  };

  // ---- sRPE: each Tally submission → one srpeLog entry (NOT auto-created sessions) ----
  // The coach plans team sessions manually; sRPE is shown only as a chart
  // on the athlete profile so it doesn't pollute the calendar.
  const num=v=>(v==null||v==='')?null:Number(v);
  for(const row of sRPE){
    const name=row['Athlete'];
    const date=row['Date']?String(row['Date']).slice(0,10):null;
    if(!name||!date)continue;
    const ath=getOrMatch(name);
    if(!ath)continue;
    const nid=`tally-srpe-${row._id}`;
    const tpRPE=num(row['TP RPE']),    tpDur=num(row['TP Duration']);
    const scRPE=num(row['S&C RPE']),   scDur=num(row['S&C Duration']);
    const gmRPE=num(row['Game RPE']),  gmDur=num(row['Game Duration']);
    const tpLoad=num(row['TP sRPE'])  ?? (tpRPE&&tpDur?tpRPE*tpDur:null);
    const scLoad=num(row['S&C sRPE']) ?? (scRPE&&scDur?scRPE*scDur:null);
    const gmLoad=gmRPE&&gmDur?gmRPE*gmDur:null;
    const totalLoad=num(row['Total sRPE']) ?? ((tpLoad||0)+(scLoad||0)+(gmLoad||0)||null);
    const entry={
      id:uid(),srcId:nid,date,
      tpRPE,tpDuration:tpDur,tpLoad:tpLoad?Math.round(tpLoad):null,
      scRPE,scDuration:scDur,scLoad:scLoad?Math.round(scLoad):null,
      gameRPE:gmRPE,gameDuration:gmDur,gameLoad:gmLoad?Math.round(gmLoad):null,
      totalLoad:totalLoad?Math.round(totalLoad):null,
    };
    const i=ath.srpeLog.findIndex(e=>(e.srcId||e.notionId)===nid);
    if(i>=0){entry.id=ath.srpeLog[i].id;ath.srpeLog[i]=entry;stats.srpeUpdated++;}
    else{ath.srpeLog.push(entry);stats.srpeAdded++;}
  }

  // ---- Wellness: each Tally submission → entry in athlete.wellness ----
  for(const row of wellness){
    const name=row['Athlete'];
    // Strip any time portion: "2026-05-22T10:00:00+03:00" → "2026-05-22"
    const date=row['Date']?String(row['Date']).slice(0,10):null;
    if(!name||!date)continue;
    const ath=getOrMatch(name);
    if(!ath)continue;
    const nid=`tally-w-${row._id}`;
    const i=ath.wellness.findIndex(w=>(w.srcId||w.notionId)===nid);
    const entry={id:i>=0?ath.wellness[i].id:uid(),srcId:nid,date,
      RHR:row['RHR'],sleep:row['Sleep'],fatigue:row['Fatigue'],
      soreness:(row['Soreness ']!=null?row['Soreness ']:row['Soreness']),
      areaOfPain:row['Area of Pain']||'',readiness:row['Readiness']};
    if(i>=0){ath.wellness[i]=entry;stats.wellnessUpdated++;}
    else{ath.wellness.push(entry);stats.wellnessAdded++;}
  }

  // Sort wellness by date for clean charts/tables
  athletes.forEach(a=>{
    if(a.wellness)a.wellness.sort((x,y)=>(x.date||'').localeCompare(y.date||''));
    if(a.srpeLog)a.srpeLog.sort((x,y)=>(x.date||'').localeCompare(y.date||''));
  });
  stats.athletesMatched=stats.athletesMatched.size;
  stats.namesSeen=[...stats.namesSeen].filter(Boolean);
  stats.skippedNames=[...stats.skippedNames].filter(Boolean);
  return{athletes,stats,syncedAt:data.syncedAt||new Date().toISOString()};
}

  const exp=()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');
    a.href=URL.createObjectURL(b);a.download=`periodization_backup_${fmt(today)}.json`;a.click();URL.revokeObjectURL(a.href);};

    r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(!p.teams&&!p.setup){alert('Invalid file');return;}if(confirm('Replace all data?'))setData(migrate(p));}catch{alert('Read error');}};
    r.readAsText(f);e.target.value='';};
  const restore=async()=>{
    const fb=FB();
    if(!fb||!sync||!sync.user){alert('Sign in with your account first to use cloud backup.');return;}
    setBusy(true);
    try{
      const bk=await cloudReadBackup(fb,sync.user.uid);
      if(!bk||!bk.str){alert('No cloud backup (previous version) found.');return;}
      const p=migrate(JSON.parse(bk.str));
      const ath=(p.teams||[]).reduce((s,t)=>s+((t.athletes||[]).length),0);
      const when=bk.at&&bk.at.toDate?bk.at.toDate().toLocaleString('tr-TR'):'bilinmiyor';
      if(confirm('Restore the previous cloud version?\n\nBackup date: '+when+'\nAthletes in backup: '+ath+'\n\nYour current data will be REPLACED with this.'))setData(p);
    }catch(e){alert('Could not read backup: '+(e.message||e));}
    finally{setBusy(false);}
  };
  return(<div>
    <div className="panel"><h2>All Teams Summary</h2>
      <table><thead><tr><th>Team</th><th>Sport</th><th>Season</th><th>Days planned</th><th>Athletes</th></tr></thead><tbody>
        {data.teams.map(t=><tr key={t.id}><td><strong>{t.setup.teamName}</strong>{t.id===data.activeTeamId&&<span className="tag" style={{marginLeft:8}}>ACTIVE</span>}</td>

          <td>{Object.values(t.days||{}).filter(d=>d.sessions?.length).length}</td>
          <td>{(t.athletes||[]).length}</td></tr>)}
      </tbody></table>
    </div>
    <div className="panel"><h2>Backup & Restore</h2>
      <div className="help" style={{marginBottom:12}}>Export saves ALL teams (one .json file). Import replaces everything currently stored — back up first!</div>
      <div className="row">
        <button className="btn" onClick={exp}>📦 Download Full Backup</button>
        <button className="btn sec" onClick={()=>fRef.current.click()}>📂 Load Backup</button>
        <input type="file" accept=".json" ref={fRef} onChange={imp} className="hidden"/>
      </div>
    </div>
    <div className="panel"><h2>☁️ Cloud Backup (Automatic)</h2>
      <div className="help" style={{marginBottom:12}}>When the data shrinks substantially (accidental deletion or signing in from an empty device), the previous cloud version is kept automatically. If something was lost, you can restore it here.</div>
      <div className="row">
        <button className="btn" disabled={busy} onClick={restore}>{busy?'Loading…':'♻️ Restore Previous Cloud Version'}</button>
      </div>
      {(!sync||!sync.user)&&<div className="help" style={{marginTop:10,color:'var(--warn,#f59e0b)'}}>Sign in with your account from the top right to use this feature.</div>}
    </div>
  </div>);
}

/* =========================================================
   ROOT
   ========================================================= */
/* =========================================================
   CLOUD SYNC (Firebase Auth + Firestore)
   The whole app state is JSON-stringified and split into
   ~700KB chunks stored at users/{uid}/data/{i}, with a meta
   doc at users/{uid} holding {chunks,rev}. This sidesteps the
   1 MiB per-document limit (athlete photos push real data
   past 2 MB). Conflict = last-write-wins + first-login merge
   prompt. Real-time pull via onSnapshot on the meta doc (rev).
   ========================================================= */
const FB=()=>(typeof firebase!=='undefined'&&firebase.apps&&firebase.apps.length)?firebase:null;
const SYNC_CHUNK=700000;
const mkRev=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
// Fast non-crypto hash (djb2) — lets us tell whether the local copy has unsynced edits
// vs the last-synced snapshot WITHOUT trusting the device clock (skewed/stale clocks
// were letting an old device overwrite newer cloud data from another computer).
const djb2=str=>{let h=5381;for(let i=0;i<str.length;i++)h=((h*33)^str.charCodeAt(i))>>>0;return h.toString(36);};
async function cloudWrite(fb,uid,str,rev,ts,editedAt){
  const db=fb.firestore();
  const userDoc=db.collection('users').doc(uid);
  const dataCol=userDoc.collection('data');
  // Read the meta doc ONCE — it gives the previous chunk count so we never
  // re-download the whole payload just to find stale chunks (main slowdown).
  // Read from CACHE so a slow/blocked Firestore connection can never stall this
  // read and prevent the actual write below from ever running. The cache is kept
  // fresh by the onSnapshot listener, so the chunk count is accurate.
  let oldN=0;
  try{
    let cur;try{cur=await userDoc.get({source:'cache'});}catch(_){cur=null;}
    if(cur&&cur.exists&&cur.data()){
      const md=cur.data();oldN=md.chunks||0;const oldSize=md.size||0;
      // SHRINK-GUARD: before drastically shrinking the cloud copy, back it up.
      if(oldN&&oldSize>5000&&str.length<oldSize*0.5){
        const bCol=userDoc.collection('backup');
        const snaps=await Promise.all(Array.from({length:oldN},(_,i)=>dataCol.doc(String(i)).get({source:'cache'})));
        const bb=db.batch();
        snaps.forEach((d,i)=>bb.set(bCol.doc(String(i)),{c:(d.exists&&d.data())?(d.data().c||''):''}));
        bb.set(userDoc,{bChunks:oldN,bRev:md.rev||'',bSize:oldSize,bAt:fb.firestore.FieldValue.serverTimestamp()},{merge:true});
        await bb.commit();
      }
    }
  }catch(e){console.warn('backup-guard',e);}
  const n=Math.max(1,Math.ceil(str.length/SYNC_CHUNK));
  rev=rev||mkRev();
  const batch=db.batch();
  for(let i=0;i<n;i++)batch.set(dataCol.doc(String(i)),{c:str.slice(i*SYNC_CHUNK,(i+1)*SYNC_CHUNK)});
  batch.set(userDoc,{chunks:n,rev:rev,size:str.length,ts:ts||Date.now(),editedAt:editedAt||ts||Date.now(),updatedAt:fb.firestore.FieldValue.serverTimestamp()},{merge:true});
  await batch.commit();
  // Drop leftover chunks ONLY when the payload shrank — by reference, no read.
  if(oldN>n){const b=db.batch();for(let i=n;i<oldN;i++)b.delete(dataCol.doc(String(i)));await b.commit();}
  return rev;
}
async function cloudRead(fb,uid){
  // Reconcile MUST hit the server, never the local Firestore cache — otherwise a
  // device with a stale offline cache "reads" old data on login and then clobbers
  // the account. fromServer tells the caller whether we actually confirmed the
  // server's truth (false = offline / read failed = it is NOT safe to upload).
  const db=fb.firestore();
  const userDoc=db.collection('users').doc(uid);
  let meta,fromServer=false;
  // Insist on the server, retrying a few times — on mobile the connection often
  // isn't warm yet at page load and the first server read fails. Without this we
  // would silently fall back to the stale local cache and show old data on open.
  for(let attempt=0;attempt<4&&!fromServer;attempt++){
    try{meta=await userDoc.get({source:'server'});fromServer=true;}
    catch(e){await new Promise(r=>setTimeout(r,400*(attempt+1)));}
  }
  if(!fromServer){try{meta=await userDoc.get();}catch(e2){return{str:null,rev:null,fromServer:false};}}
  if(!meta.exists||!meta.data()||!meta.data().chunks)return{str:null,rev:null,fromServer};
  const md=meta.data(),n=md.chunks;
  const opt=fromServer?{source:'server'}:undefined;
  const chunk=i=>userDoc.collection('data').doc(String(i)).get(opt)
    .then(d=>(d.exists&&d.data())?(d.data().c||''):'')
    .catch(()=>userDoc.collection('data').doc(String(i)).get().then(d=>(d.exists&&d.data())?(d.data().c||''):''));
  // Read all chunks in parallel (was sequential = N round-trips = slow reconcile)
  const parts=await Promise.all(Array.from({length:n},(_,i)=>chunk(i)));
  return{str:parts.join(''),rev:md.rev,ts:md.ts||0,editedAt:md.editedAt||md.ts||0,fromServer};
}
async function cloudReadBackup(fb,uid){
  const db=fb.firestore();
  const userDoc=db.collection('users').doc(uid);
  const meta=await userDoc.get();
  if(!meta.exists||!meta.data()||!meta.data().bChunks)return null;
  const md=meta.data(),n=md.bChunks,parts=[];
  for(let i=0;i<n;i++){const d=await userDoc.collection('backup').doc(String(i)).get();parts.push((d.exists&&d.data())?(d.data().c||''):'');}
  return{str:parts.join(''),rev:md.bRev,size:md.bSize||0,at:md.bAt};
}
// "real data" = this device actually has athletes / planned days / exercises,
// not just the empty default template. Used to decide sync direction safely.
function hasRealData(d){
  if(!d||!Array.isArray(d.teams))return false;
  if(d.teams.some(t=>(t.athletes&&t.athletes.length)||(t.days&&Object.keys(t.days).length)))return true;
  if(Array.isArray(d.exercises)&&d.exercises.length)return true;
  return false;
}
/* ---- Structural merge: union two divergent copies so additions on EITHER device survive. ----
   Whole-document last-writer-wins is what caused "add a session on PC1, lose it the moment PC2
   syncs": a device flagged dirty used to overwrite the entire cloud with its own copy. We instead
   union calendar days (by date) and the sessions inside them (by id), athletes (by id) and their
   sub-records, plus exercises & researches (by id). On a genuine same-key conflict we prefer
   `local` (the device currently holding unsynced edits). A deletion on one device yields to the
   other's copy — acceptable here because the user's stated priority is never losing what was
   added on any device. */
function _mergeBy(cloudArr,localArr,keyFn,mergeItem){
  const order=[];const map=new Map();
  (cloudArr||[]).forEach(x=>{const k=keyFn(x);if(!map.has(k))order.push(k);map.set(k,x);});
  (localArr||[]).forEach(x=>{const k=keyFn(x);
    if(map.has(k))map.set(k,mergeItem?mergeItem(map.get(k),x):x);
    else{order.push(k);map.set(k,x);}});
  return order.map(k=>map.get(k));
}
function _mergeDayMap(cloudDays,localDays){
  const out={};const dates=new Set([...Object.keys(cloudDays||{}),...Object.keys(localDays||{})]);
  dates.forEach(dt=>{const c=cloudDays&&cloudDays[dt],l=localDays&&localDays[dt];

function useCloudSync(data,setData){
  const[user,setUser]=useState(null);
  const[authLoading,setAuthLoading]=useState(true);
  const[status,setStatus]=useState('offline'); // offline|syncing|synced|error
  const[syncErr,setSyncErr]=useState('');
  const[authErr,setAuthErr]=useState(''); // surfaced from redirect sign-in (errors happen on page load, not in a click handler)
  const dataRef=useRef(data); dataRef.current=data;
  const lastJson=useRef(null); // exact JSON string we currently know is in the cloud
  const lastRev=useRef(null);  // the cloud revision we are currently in sync with
  const ready=useRef(false);   // true only AFTER the first cloud reconcile on login
  const timer=useRef(null);
  const writeRef=useRef(null); // current immediate-write fn (debounce + flush-on-hide)
  const pullRef=useRef(null);  // current pull-from-server fn (focus/online)
  // Content hash of the last-synced copy, persisted across reloads. THIS is how we tell —
  // without ever trusting a device clock — whether this device holds edits the cloud does
  // not have yet. Device clocks are unreliable: a phone running a couple of minutes ahead
  // used to make its older data look "newer" and silently overwrite a computer's fresh
  // edits. Ordering is therefore based purely on content + revision identity, never time.
  const cleanHash=useRef((()=>{try{return localStorage.getItem('pp-data-hash')||null;}catch(e){return null;}})());
  // Last-writer-wins ordering across devices, WITHOUT trusting a raw device clock. We calibrate
  // an offset to the Firestore SERVER clock once per session, so every device stamps its edits on
  // the same skew-free timeline. The most recently edited copy wins everywhere → "the last action
  // shows on every device", like Google Drive, with no flip-flop.
  const serverOffset=useRef(0);            // ms to add to Date.now() to approximate server time
  const localEditAt=useRef(0);             // server-time of this device's latest UNSYNCED user edit
  const nowTs=()=>Date.now()+serverOffset.current;
  const markSynced=(rev,str)=>{
    lastRev.current=rev;lastJson.current=str;localEditAt.current=0; // synced → no pending local edit
    const h=djb2(str);cleanHash.current=h;
    try{localStorage.setItem('pp-data-rev',rev||'');localStorage.setItem('pp-data-hash',h);}catch(e){}
  };
  // Does this device hold edits not yet pushed to the cloud?
  const dirty=()=>{
    const cur=JSON.stringify(dataRef.current);
    if(lastJson.current!=null)return cur!==lastJson.current;          // since login: vs the known cloud copy
    if(cleanHash.current!=null)return djb2(cur)!==cleanHash.current;  // fresh page load: vs persisted baseline
    return false;                                                    // never synced & no baseline → defer to cloud
  };
  const adopt=cloud=>{
    const p=migrate(JSON.parse(cloud.str));const pstr=JSON.stringify(p);
    if(pstr!==JSON.stringify(dataRef.current))setData(p);
    markSynced(cloud.rev,pstr);
    setStatus('synced');ready.current=true;
  };
  // This device is dirty AND the cloud has diverged → union both (so neither device's additions
  // are lost), show the merged result here, and push it up as the new shared truth.
  const mergeUp=async cloud=>{
    const fb=FB(); if(!fb||!user)return;
    const merged=mergeStates(migrate(JSON.parse(cloud.str)),dataRef.current);
    const mstr=JSON.stringify(merged);
    if(mstr!==JSON.stringify(dataRef.current))setData(merged);
    ready.current=true;
    const rev=mkRev();setStatus('syncing');
    try{await cloudWrite(fb,user.uid,mstr,rev,null,localEditAt.current||nowTs());markSynced(rev,mstr);setStatus('synced');setSyncErr('');}
    catch(e){console.warn('mergeUp',e);setStatus('error');setSyncErr(e.code||e.message||'unknown');}
  };

  // auth state
  useEffect(()=>{
    const fb=FB();
    if(!fb){setAuthLoading(false);return;}
    // Complete any pending redirect sign-in (popup→redirect fallback). Success flows
    // through onAuthStateChanged; here we only need to surface a failure to the user.
    fb.auth().getRedirectResult().catch(e=>{
      const m={'auth/unauthorized-domain':'Bu domain Firebase\'de yetkili değil. Authentication → Settings → Authorized domains listesine bu sitenin adresini (ör. ...netlify.app) ekle.',
        'auth/operation-not-allowed':'Google girişi Firebase Console\'da etkin değil.',
        'auth/account-exists-with-different-credential':'Bu e-posta başka bir yöntemle kayıtlı.',
        'auth/network-request-failed':'İnternet bağlantısı hatası.'}[e.code]||(e.code?e.code+': '+e.message:e.message);
      setAuthErr(m);
    });
    return fb.auth().onAuthStateChanged(u=>{
      setAuthLoading(false);
      setUser(u||null);
      if(!u){
        setStatus('offline');lastJson.current=null;lastRev.current=null;ready.current=false;setSyncErr('');
        // Keep pp-data (and its hash baseline) so unsynced edits can still seed on next sign-in.
      }
    });
  },[]);

  // subscribe to cloud (meta doc) on login
  useEffect(()=>{
    const fb=FB(); if(!fb||!user)return;
    setStatus('syncing');
    ready.current=false;lastJson.current=null;lastRev.current=null; // block uploads until reconciled
    const userDoc=fb.firestore().collection('users').doc(user.uid);
    // Calibrate our offset to the Firestore server clock (round-trip estimate) so cross-device
    // edit-time comparisons are skew-free. Writes a tiny field on the (always-writable) meta doc
    // and reads back its server time. Fire-and-forget; until it resolves we fall back to the raw
    // device clock (good enough, and corrected within ~1s of login).
    (async()=>{try{
      const t0=Date.now();
      await userDoc.set({clockPing:fb.firestore.FieldValue.serverTimestamp()},{merge:true});
      const cs=await userDoc.get({source:'server'});
      const sm=(cs.exists&&cs.data()&&cs.data().clockPing)?cs.data().clockPing.toMillis():null;
      if(sm){const t1=Date.now();serverOffset.current=Math.round(sm-(t0+t1)/2);}
    }catch(e){/* offline / blocked → keep raw clock */}})();
    let first=true;
    const seedUp=async str=>{const rev=mkRev();setStatus('syncing');try{await cloudWrite(fb,user.uid,str,rev,null,localEditAt.current||nowTs());markSynced(rev,str);setStatus('synced');setSyncErr('');}catch(e){console.warn('seed',e);setStatus('error');setSyncErr(e.code||e.message||'unknown');}};
    const unsub=userDoc.onSnapshot(async snap=>{
      try{
        const rev=(snap.exists&&snap.data())?snap.data().rev:null;
        if(first){
          first=false;
          const localStr=JSON.stringify(dataRef.current);
          const cloud=await cloudRead(fb,user.uid);
          if(cloud&&cloud.fromServer){
            if(!cloud.str){
              // Cloud is empty → seed our data up if we have any, else just start clean.
              if(hasRealData(dataRef.current)){ready.current=true;await seedUp(localStr);}
              else{markSynced(cloud.rev||null,localStr);setStatus('synced');ready.current=true;}
            }else if(dirty()){
              // This device has unsynced edits AND the cloud holds another device's copy → MERGE
              // the two so additions on both survive, rather than overwriting the cloud with ours
              // (the old behavior that silently dropped the other device's new sessions).
              await mergeUp(cloud);
            }else{
              // Clean device → the cloud is the single source of truth. This is the cross-device
              // case: open the app elsewhere and you get exactly what the other device saved.
              adopt(cloud);
            }
          }else if(cloud&&cloud.str){
            // Only the offline cache answered — show it but don't trust it / don't allow uploads
            // yet (could be stale). Retry the server shortly.
            const p=migrate(JSON.parse(cloud.str));const pstr=JSON.stringify(p);
            if(pstr!==localStr)setData(p);
            lastJson.current=pstr;lastRev.current=cloud.rev;setStatus('syncing');
            [1500,4000,9000].forEach(ms=>setTimeout(()=>{pullRef.current&&pullRef.current();},ms));
          }else{
            setStatus('syncing');
            [1500,4000,9000].forEach(ms=>setTimeout(()=>{pullRef.current&&pullRef.current();},ms));
          }
        }else if(rev&&rev!==lastRev.current&&!(snap.metadata&&snap.metadata.hasPendingWrites)){
          // A genuine change from another device. LAST-WRITER-WINS by skew-corrected edit time:
          // whatever was edited most recently shows on every device (Google-Drive style).
          const cloud=await cloudRead(fb,user.uid);
          if(cloud&&cloud.fromServer&&cloud.str){
            if(!dirty())adopt(cloud);                                   // we have no local edit → take theirs
            else if(localEditAt.current>(cloud.editedAt||0))writeNow(); // our edit is newer → it wins
            else adopt(cloud);                                          // their edit is newer → it wins (our older edit yields)
          }
        }
      }catch(e){console.warn('sync',e);setStatus('error');}
    },err=>{console.warn('sync sub',err);setStatus('error');});
    return unsub;
  },[user]);

  // Immediate write helper + pull-on-focus. Flush-on-hide so a pending change is never lost
  // when the tab is hidden / closed / the user switches device.
  useEffect(()=>{
    const fb=FB(); if(!fb||!user){writeRef.current=null;pullRef.current=null;return;}
    const writeNow=()=>{
      if(!ready.current)return;
      if(timer.current){clearTimeout(timer.current);timer.current=null;}
      const j=JSON.stringify(dataRef.current);
      if(j===lastJson.current)return;
      const rev=mkRev();
      const editedAt=localEditAt.current||nowTs(); // stamp the actual user-edit time (for LWW ordering)
      setStatus('syncing');
      // Advance lastJson/lastRev ONLY after the server confirms the write, so a failed or
      // still-queued write stays "dirty" and is retried on focus — never silently lost.
      cloudWrite(fb,user.uid,j,rev,null,editedAt)
        .then(()=>{markSynced(rev,j);setStatus('synced');setSyncErr('');})
        .catch(e=>{console.warn('write',e);setStatus('error');setSyncErr(e.code||e.message||'unknown');});
    };
    writeRef.current=writeNow;
    // Pull the latest from the server whenever this tab becomes active again. Browsers
    // throttle/suspend the realtime listener in background tabs, so a change made on another
    // device may not arrive until you come back here — this makes "switch back to a device"
    // refresh itself, like other apps, with no manual reload.
    let pulling=false;
    const pullNow=async()=>{
      if(pulling)return;
      if(typeof navigator!=='undefined'&&navigator.onLine===false)return;
      pulling=true;
      try{
        // ALWAYS look at the server before deciding. The old code, when this device was dirty,
        // pushed our copy up WITHOUT reading the cloud — so clicking back into a window could
        // overwrite the other device's new sessions. Now: if the cloud has moved on, we merge;
        // if it hasn't, our edits are pure additions on the shared base and are safe to push.
        const cloud=await cloudRead(fb,user.uid);
        if(cloud&&cloud.fromServer){
          const cloudMoved=cloud.str&&cloud.rev!==lastRev.current;
          if(dirty()){
            // Last-writer-wins: push ours only if our edit is newer than the cloud's; otherwise
            // the cloud holds a more recent action and we adopt it (no flip-flop, no stale clobber).
            if(!cloudMoved||localEditAt.current>(cloud.editedAt||0))writeNow();
            else adopt(cloud);
          }else if(cloudMoved){
            adopt(cloud);                           // only the cloud changed → take it
          }
          ready.current=true;setStatus('synced');
          // Cold start that couldn't reconcile on login but the cloud is confirmed empty:
          // push our real data up so it isn't stranded on this device.
          if(!cloud.str&&hasRealData(dataRef.current)){ready.current=true;writeNow();}
        }
      }catch(e){console.warn('pull',e);}
      finally{pulling=false;}
    };
    pullRef.current=pullNow;
    // Firestore offline-persistence queues the mutation locally, so even if the page is
    // closing the change survives and syncs on the next opportunity.
    const onVis=()=>{if(document.visibilityState==='hidden')writeNow();else pullNow();};
    const onLeave=()=>writeNow();
    document.addEventListener('visibilitychange',onVis);
    window.addEventListener('focus',pullNow);
    window.addEventListener('online',pullNow);
    window.addEventListener('pagehide',onLeave);
    window.addEventListener('beforeunload',onLeave);
    return ()=>{
      writeRef.current=null;pullRef.current=null;
      document.removeEventListener('visibilitychange',onVis);
      window.removeEventListener('focus',pullNow);
      window.removeEventListener('online',pullNow);
      window.removeEventListener('pagehide',onLeave);
      window.removeEventListener('beforeunload',onLeave);
    };
  },[user]);

  // write local changes up (short debounce, flushed via writeRef)
  useEffect(()=>{
    const fb=FB(); if(!fb||!user)return;
    if(timer.current){clearTimeout(timer.current);timer.current=null;} // cancel any pending (possibly stale) write
    if(!ready.current)return;          // don't upload until the cloud has been reconciled on login
    const j=JSON.stringify(data);
    if(j===lastJson.current)return;
    localEditAt.current=nowTs();        // a real local user edit just happened — stamp its time (for LWW)
    setStatus('syncing');
    timer.current=setTimeout(()=>{writeRef.current&&writeRef.current();},600);
  },[data,user]);

  // One-time per session: once the cloud copy is in sync, heal it by moving any inline base64
  // photos out to Storage. This shrinks an already-bloated account so every later sync is fast.
  const migrated=useRef(false);
  useEffect(()=>{
    const fb=FB();
    if(!fb||!user||status!=='synced'||migrated.current)return;
    migrated.current=true;
    (async()=>{
      try{
        const clone=JSON.parse(JSON.stringify(dataRef.current));
        const changed=await migrateEmbeddedPhotos(clone,fb,user.uid);
        if(changed)setData(clone); // small payload now → syncs up quickly to every device
      }catch(e){console.warn('photo-migrate',e);}
    })();
  },[status,user]);

  // Manual override: pull the cloud copy and make THIS device match it, no questions asked.
  // Escape hatch for "the wrong device became dominant" — tap it on the device showing the
  // stale data and it adopts whatever the cloud (i.e. the other device) last saved.
  const forcePull=async()=>{
    const fb=FB(); if(!fb||!user)return;
    setStatus('syncing');
    try{
      const cloud=await cloudRead(fb,user.uid);
      if(cloud&&cloud.fromServer&&cloud.str)adopt(cloud);
      else if(cloud&&cloud.fromServer){ready.current=true;setStatus('synced');} // cloud empty
      else setStatus('error');
    }catch(e){console.warn('forcePull',e);setStatus('error');}
  };

  return{user,status,authLoading,syncErr,authErr,clearAuthErr:()=>setAuthErr(''),forcePull,
    signIn:(e,p)=>FB().auth().signInWithEmailAndPassword(String(e||'').trim(),String(p||'')),
    signUp:(e,p)=>FB().auth().createUserWithEmailAndPassword(String(e||'').trim(),String(p||'')),
    // returns the providers a given email is registered with, e.g. ['google.com'] or ['password']; [] if unknown/none
    methodsFor:(e)=>FB().auth().fetchSignInMethodsForEmail(String(e||'').trim()).catch(()=>[]),
    signOut:()=>FB().auth().signOut(),
    signInWithGoogle:async()=>{
      const p=new firebase.auth.GoogleAuthProvider();
      p.setCustomParameters({prompt:'select_account'});
      try{return await FB().auth().signInWithPopup(p);}
      catch(e){
        // On some hosts (e.g. Netlify) COOP / popup blockers sever the popup's window.opener,
        // so the popup just closes and the result never returns. Fall back to a full-page
        // redirect, which doesn't depend on window.opener. The result is picked up by
        // getRedirectResult() on reload. A genuinely unauthorized domain etc. is rethrown.
        const toRedirect=['auth/popup-closed-by-user','auth/cancelled-popup-request','auth/popup-blocked',
          'auth/web-storage-unsupported','auth/operation-not-supported-in-this-environment','auth/internal-error'];
        if(toRedirect.includes(e.code)){await FB().auth().signInWithRedirect(p);return;}
        throw e;
      }
    }}
}

function AuthModal({sync,onClose}){
  const[mode,setMode]=useState('signin');
  const[email,setEmail]=useState('');
  const[pw,setPw]=useState('');
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  const submit=async()=>{
    const mail=email.trim(), pass=pw;
    if(!mail){setErr('Enter an email.');return;}
    if(!pass){setErr('Enter a password.');return;}
    if(mode==='signup'&&pass.length<6){setErr('Password must be at least 6 characters.');return;}
    setErr('');setBusy(true);
    try{
      if(mode==='signin')await sync.signIn(mail,pass);
      else await sync.signUp(mail,pass);
      onClose();
    }catch(e){
      if(e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'||
         e.code==='auth/user-not-found'||e.code==='auth/email-already-in-use'){
        const methods=await sync.methodsFor(mail);
        if(methods.includes('google.com')&&!methods.includes('password')){
          setErr('This email is registered via Google (no password). Use the Google Sign-In button.');setBusy(false);return;}
        if(mode==='signup'&&methods.length){setErr('This email is already registered — Sign in.');setBusy(false);return;}
        if(mode==='signin'&&methods.length===0){setErr('No account for this email (or wrong password). Sign up first.');setBusy(false);return;}
      }
      const m={'auth/invalid-email':'Invalid email.','auth/missing-password':'Enter a password.',
        'auth/weak-password':'Password must be at least 6 characters.','auth/email-already-in-use':'This email is already registered — Sign in.',
        'auth/invalid-credential':'Wrong email or password.','auth/user-not-found':'Account not found — sign up first.',
        'auth/wrong-password':'Wrong password.','auth/network-request-failed':'Connection error.',
        'auth/too-many-requests':'Too many attempts — wait a bit and retry.'}[e.code]||e.message;
      setErr(m);
    }finally{setBusy(false);}
  };
  return(<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',backdropFilter:'blur(4px)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center'}}>
    <div onClick={e=>e.stopPropagation()} className="panel" style={{width:360,maxWidth:'92vw',margin:0}}>
      <h2>☁ {mode==='signin'?'Cloud Sign-in':'Create Account'}</h2>
      <div className="help" style={{marginBottom:12}}>Sign in with the same email/password on all your devices — your data syncs automatically.</div>
      <label>E-posta</label>
      <input type="email" value={email} onChange={e=>setEmail(e.target.value)} autoComplete="username" placeholder="ornek@mail.com"/>
      <label style={{marginTop:10}}>Password {mode==='signup'&&<span style={{textTransform:'none',color:'var(--dim)'}}>(at least 6 characters)</span>}</label>
      <input type="password" value={pw} onChange={e=>setPw(e.target.value)} autoComplete={mode==='signin'?'current-password':'new-password'}
        onKeyDown={e=>{if(e.key==='Enter')submit();}} placeholder="••••••"/>
      {err&&<div style={{color:'var(--red)',fontSize:12,marginTop:10}}>{err}</div>}
      <button className="btn" style={{width:'100%',marginTop:14}} disabled={busy} onClick={submit}>{busy?'...':(mode==='signin'?'Sign In':'Sign Up')}</button>
      <div style={{textAlign:'center',marginTop:12,fontSize:12,color:'var(--muted)'}}>
        {mode==='signin'?"Don't have an account? ":'Already have an account? '}
        <a style={{color:'var(--accent2)',cursor:'pointer',fontWeight:600}} onClick={()=>{setErr('');setMode(mode==='signin'?'signup':'signin');}}>{mode==='signin'?'Sign up':'Sign in'}</a>
      </div>
    </div>
  </div>);
}

        {isRules?(

          <code style={{display:'block',marginTop:4,padding:4,background:'rgba(0,0,0,.3)',borderRadius:4,fontSize:10,whiteSpace:'pre',userSelect:'all'}}>{'rules_version = \'2\';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /users/{uid}/{doc=**} {\n      allow read, write: if request.auth.uid == uid;\n    }\n  }\n}'}</code>

function videoEmbed(src){
  if(!src)return null;
  if(src.startsWith('data:'))return{kind:'file',src};
  let m;
  if((m=src.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{6,})/)))return{kind:'iframe',src:'https://www.youtube.com/embed/'+m[1]};
  if((m=src.match(/vimeo\.com\/(?:video\/)?(\d+)/)))return{kind:'iframe',src:'https://player.vimeo.com/video/'+m[1]};
  // Instagram reels / posts / IGTV → official embeddable endpoint (raw URL blocks iframing)
  if((m=src.match(/instagram\.com\/(reel|reels|p|tv)\/([\w-]+)/i))){const ty=m[1].toLowerCase()==='reels'?'reel':m[1].toLowerCase();return{kind:'iframe',ig:true,src:'https://www.instagram.com/'+ty+'/'+m[2]+'/embed/'};}
  // TikTok video → embed player
  if((m=src.match(/tiktok\.com\/(?:.*\/video\/|v\/)(\d+)/)))return{kind:'iframe',src:'https://www.tiktok.com/embed/v2/'+m[1]};
  if(/\.(mp4|webm|ogg|mov|m4v)(\?|$)/i.test(src))return{kind:'file',src};
  if(/^https?:\/\//i.test(src))return{kind:'iframe',src};
  return null;
}
// Derive a cover-image URL from a video link (YouTube / Vimeo). Returns '' if none.
function videoThumb(src){
  if(!src)return'';
  let m;
  if((m=src.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{6,})/)))return'https://img.youtube.com/vi/'+m[1]+'/hqdefault.jpg';
  if((m=src.match(/vimeo\.com\/(?:video\/)?(\d+)/)))return'https://vumbnail.com/'+m[1]+'.jpg';
  return'';
}
// Best-effort: fetch the og:image (cover) of an Instagram reel/post via CORS proxies.
async function fetchOgImage(url){
  if(!url||!/instagram\.com\//i.test(url))return'';
  const proxies=[u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),u=>'https://corsproxy.io/?url='+encodeURIComponent(u)];
  const fetchT=(u,ms=7000)=>{const c=new AbortController();const id=setTimeout(()=>c.abort(),ms);return fetch(u,{cache:'no-store',signal:c.signal}).finally(()=>clearTimeout(id));};
  for(const p of proxies){
    try{const res=await fetchT(p(url));if(!res.ok)continue;const html=await res.text();
      let m=html.match(/property=["']og:image["']\s+content=["']([^"']+)["']/i)||html.match(/"display_url":"([^"]+)"/);
      if(m)return m[1].replace(/\\u0026/g,'&').replace(/\\\//g,'/').replace(/&amp;/g,'&');
    }catch(e){/* next */}
  }
  return'';
}

// Instagram reel/post → fetch the real MP4 (og:video) via a CORS proxy and play
// it inline as a <video>. Falls back to the official embed card if extraction fails.
function InstagramVideo({url,embedSrc}){
  const[st,setSt]=useState({loading:true,mp4:'',failed:false});
  useEffect(()=>{
    let alive=true;setSt({loading:true,mp4:'',failed:false});
    const proxies=[
      u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
      u=>'https://corsproxy.io/?url='+encodeURIComponent(u),
      u=>'https://r.jina.ai/'+u,
    ];
    const extract=html=>{
      let m=html.match(/property=["']og:video(?::secure_url)?["']\s+content=["']([^"']+)["']/i)
        ||html.match(/content=["']([^"']+)["']\s+property=["']og:video(?::secure_url)?["']/i)
        ||html.match(/"video_url":"([^"]+)"/)
        ||html.match(/"video_versions":\[\{[^}]*?"url":"([^"]+)"/);
      if(!m)return'';
      return m[1].replace(/\\u0026/g,'&').replace(/\\\//g,'/').replace(/&amp;/g,'&');
    };
    const fetchT=(u,ms=7000)=>{const c=new AbortController();const id=setTimeout(()=>c.abort(),ms);
      return fetch(u,{cache:'no-store',signal:c.signal}).finally(()=>clearTimeout(id));};
    (async()=>{
      for(const p of proxies){
        try{
          const res=await fetchT(p(url));
          if(!res.ok)continue;
          const html=await res.text();
          const v=extract(html);
          if(v&&alive){setSt({loading:false,mp4:v,failed:false});return;}
        }catch(e){/* try next proxy */}
      }
      if(alive)setSt({loading:false,mp4:'',failed:true});
    })();
    return()=>{alive=false;};
  },[url]);
  if(st.loading)return<div className="ex-novid">Instagram videosu yükleniyor…</div>;
  if(st.mp4)return<video className="ex-video" src={st.mp4} controls playsInline preload="metadata"/>;
  // Extraction failed → official embed card (plays inside the card; may need a tap)
  return<iframe className="ex-video" src={embedSrc} title="exercise video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen frameBorder="0"/>;
}
function VideoPlayer({ex}){
  const v=videoEmbed(ex.videoData||ex.videoUrl);
  if(!v)return<div className="ex-novid">Henüz video yok — aşağıdan link yapıştır ya da video yükle.</div>;

}

  // Static cover: manual cover → YouTube/Vimeo auto-thumb → fetched Instagram cover
  const cover=ex.thumb||videoThumb(ex.videoData||ex.videoUrl)||igImg;
  // Instagram reels have no auto thumbnail → fetch the og:image once, when no manual cover is set
  useEffect(()=>{

    let alive=true;(async()=>{const img=await fetchOgImage(ex.videoData||ex.videoUrl);if(alive&&img)setIgImg(img);})();

  },[ex.videoUrl,ex.videoData,ex.thumb]);

  const previewSrc=v&&v.kind==='iframe'?(v.src+(v.src.indexOf('?')>=0?'&':'?')+'autoplay=1&mute=1&muted=1&controls=0&playsinline=1&loop=1&modestbranding=1'):null;
  return(<div className="ex-card" onClick={onOpen} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>

        cover ? <img src={cover} alt="" onError={e=>{e.target.style.display='none';}}/>
        : (v&&v.kind==='file') ? <video className="ex-thumb-vid" src={v.src+'#t=0.1'} muted preload="metadata" playsInline/>
        : <div className="ex-thumb-ph">🏋</div>
      )}
      {v&&!hov&&<span className="ex-vbadge">▶</span>}
      {used>0&&<span className="ex-used" title={`Sezon programında ${used} kez kullanıldı`}>{used}× used</span>}

  const remove=id=>{if(window.confirm('Bu egzersiz silinsin mi?')){setExercises(exercises.filter(e=>e.id!==id));setOpenId(null);}};
  const addExercise=type=>{const t=type||activeType||'';const e={id:uid(),name:'',type:t==='__uncat__'?'':t,subType:'',muscle:[],videoUrl:'',videoData:'',thumb:'',purpose:''};setExercises([e,...exercises]);setOpenId(e.id);};
  const typeCounts=useMemo(()=>{const m={};EX_TYPES.forEach(t=>m[t]=0);exercises.forEach(e=>{if(EX_TYPES.includes(e.type))m[e.type]=(m[e.type]||0)+1;});return m;},[exercises]);

  const typeSample=useMemo(()=>{const m={};EX_TYPES.forEach(t=>{m[t]=exercises.find(e=>e.type===t&&(e.thumb||e.videoUrl||e.videoData));});return m;},[exercises]);
  const open=exercises.find(e=>e.id===openId);
  const goBack=()=>{setActiveType(null);setFSub('');setFMuscle('');setFPattern('');setQ('');};
  // How many times each exercise name is prescribed across the whole season program (all teams).
  const usageCounts=useMemo(()=>{const m={};
    (data.teams||[]).forEach(t=>Object.values(t.days||{}).forEach(day=>(day.sessions||[]).forEach(s=>(s.blocks||[]).forEach(b=>(b.exercises||[]).forEach(ex=>{
      const n=(ex.name||'').trim().toLowerCase();if(n)m[n]=(m[n]||0)+1;})))));
    return m;},[data.teams]);
  const usedOf=e=>usageCounts[(e.name||'').trim().toLowerCase()]||0;
  // Exercises with no/unknown category (e.g. auto-added from the program editor) live here
  // so the coach can find and categorise them later.
  const uncatCount=exercises.filter(e=>!EX_TYPES.includes(e.type)).length;
  // Top-right category dropdown (label → EX_TYPES value).
  const CAT_OPTIONS=[['Upper Body Push','Upper Body Push'],['Upper Body Pull','Upper Body Pull'],['Hip Dominant','Hip Dominant'],['Knee Dominant','Knee Dominant'],['Full Body','Full Body'],['Core','Core'],['Multidirectional Speed','Multi Directional Speed'],['Plyometric','Plyometric']];

      {uncatCount>0&&<option value="__uncat__">Kategorisiz ({uncatCount})</option>}
    </select>);

  // ----- Library landing — ALL exercises mixed across categories -----
  if(!activeType){
    const ql0=q.trim().toLowerCase();
    // Stable pseudo-random order (seeded by id) so categories are intermixed but the
    // grid doesn't reshuffle on every render.
    const hashStr=s=>{let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return h;};
    const mixed=[...exercises].sort((a,b)=>hashStr(String(a.id||a.name||''))-hashStr(String(b.id||b.name||'')));

      <datalist id="ex-types">{EX_TYPES.map(t=><option key={t} value={t}/>)}</datalist>

      {open && <ExerciseModal ex={open} onChange={p=>patch(open.id,p)} onDelete={()=>remove(open.id)} onClose={()=>setOpenId(null)}/>}
    </div>);
  }

  // ----- Inside a category -----
  const isUncat=activeType==='__uncat__';
  const sub=isUncat?null:(SUB_TYPES[activeType]||null);
  const hasMuscleFilter=false;   // muscle-group filter removed; Hip/Knee Dominant use Movement Pattern
  const hasPatternFilter=!isUncat&&!!PATTERNS_FOR[activeType];

    if(hasMuscleFilter&&fMuscle&&!(e.muscle||[]).includes(fMuscle))return false;
    if(hasPatternFilter&&fPattern&&e.pattern!==fPattern)return false;
    return true;
  });

  return(<div className="ex-wrap">
    <datalist id="ex-types">{EX_TYPES.map(t=><option key={t} value={t}/>)}</datalist>
    <datalist id="ex-muscles">{EX_MUSCLES.map(t=><option key={t} value={t}/>)}</datalist>
    <div className="ex-top">
      <div>
        <button className="btn sec sm" onClick={goBack} style={{marginBottom:8}}>← Kategoriler</button>
        <h1 className="ex-h1">{isUncat?'Kategorisiz':activeType}</h1>
        {isUncat&&<div className="sub">Programdan otomatik eklenen / kategorisi atanmamış egzersizler. Kart'a tıklayıp kategori ata.</div>}
        {sub&&<div className="sub">Filtre: <b>{sub.label}</b>{hasPatternFilter?' · Movement Pattern':''}</div>}
      </div>
      {catDropdown}
    </div>
    <div className="ex-toolbar">
      <div className="ex-search"><span>🔍</span><input value={q} onChange={e=>setQ(e.target.value)} placeholder={`${activeType} ara…`}/></div>
      <button className="btn sm" onClick={()=>addExercise()}>＋ Egzersiz Ekle</button>
    </div>
    {(()=>{const c=TYPE_COLORS[activeType]||'#22d3ee';
      const onSty={background:c,borderColor:c,color:'#0f1526',boxShadow:`0 0 12px ${c}aa, inset 0 0 6px ${c}55`,fontWeight:800};
      const offSty={background:'#0f1526',borderColor:c,color:'#ffffff',boxShadow:`0 0 6px ${c}66, inset 0 0 5px ${c}33`};
      const ChipRow=({label,values,val,setVal})=>(<div className="chip-row">
        <span className="chip-row-lbl">{label}</span>
        <button className={`fchip${val===''?' on':''}`} style={val===''?onSty:offSty} onClick={()=>setVal('')}>All</button>
        {values.map(v=><button key={v} className={`fchip${val===v?' on':''}`} style={val===v?onSty:offSty} onClick={()=>setVal(val===v?'':v)}>{v}</button>)}
      </div>);
      return(<div className="chip-filters">
        {sub&&<ChipRow label={sub.label} values={sub.values} val={fSub} setVal={setFSub}/>}
        {hasPatternFilter&&<ChipRow label="Movement Pattern" values={patternVals} val={fPattern} setVal={setFPattern}/>}
      </div>);})()}
    {list.length===0&&<div className="ex-empty">Bu kategoride{(fSub||fMuscle||fPattern||q)?' filtreyle eşleşen':''} egzersiz yok. <b>＋ Egzersiz Ekle</b> ile ekle.</div>}
    <div className="ex-grid">{list.map(e=><ExerciseCard key={e.id} ex={e} used={usedOf(e)} onOpen={()=>setOpenId(e.id)}/>)}</div>
    {open && <ExerciseModal ex={open} onChange={p=>patch(open.id,p)} onDelete={()=>remove(open.id)} onClose={()=>setOpenId(null)}/>}
  </div>);
}

/* =========================================================
   RESEARCHES — article-summary blog (auto APA via CrossRef)
   ========================================================= */
async function fetchCrossref(input){
  const m=(input||'').match(/10\.\d{4,9}\/[^\s"<>]+/i);
  if(!m)throw new Error('DOI bulunamadı — makalenin DOI içeren linkini ya da DOI’sini gir (ör. 10.1234/abcd).');
  const doi=m[0].replace(/[).,;]+$/,'');
  const r=await fetch('https://api.crossref.org/works/'+encodeURIComponent(doi),{headers:{'Accept':'application/json'}});
  if(!r.ok)throw new Error('CrossRef HTTP '+r.status);
  const w=(await r.json()).message;
  const dp=((w.issued||w['published']||w['published-print']||w['published-online']||{})['date-parts']||[[]])[0]||[];
  return{doi,url:w.URL||input,
    authors:(w.author||[]).map(a=>({family:a.family||'',given:a.given||''})),
    year:dp[0]||'',date:dp.join('-'),
    title:(w.title&&w.title[0])||'',journal:(w['container-title']&&w['container-title'][0])||'',
    volume:w.volume||'',issue:w.issue||'',page:w.page||''};
}
function apaCite(m){
  const fmtA=a=>{const ini=(a.given||'').split(/[\s.]+/).filter(Boolean).map(s=>s[0].toUpperCase()+'.').join(' ');return (a.family||'')+(ini?', '+ini:'');};
  const A=m.authors||[];let auth='';
  if(A.length===1)auth=fmtA(A[0]);
  else if(A.length>=2&&A.length<=20)auth=A.slice(0,-1).map(fmtA).join(', ')+', & '+fmtA(A[A.length-1]);
  else if(A.length>20)auth=A.slice(0,19).map(fmtA).join(', ')+', … '+fmtA(A[A.length-1]);
  const yr=m.year?`(${m.year}).`:'(n.d.).';
  const title=m.title?(m.title.replace(/\s*\.\s*$/,'')+'.'):'';
  let src='';
  if(m.journal){src=m.journal+(m.volume?`, ${m.volume}`:'')+(m.issue?`(${m.issue})`:'')+(m.page?`, ${m.page}`:'')+'.';}
  const link=m.doi?`https://doi.org/${m.doi}`:(m.url||'');
  return [auth,yr,title,src,link].filter(Boolean).join(' ').replace(/\s+/g,' ').trim();
}
function authorsLine(m){
  const A=m.authors||[];if(!A.length)return m.authorsText||'';
  return A.map(a=>[a.given,a.family].filter(Boolean).join(' ')).join(', ');
}
// Minimal rich-text editor (contentEditable + execCommand) — stores HTML.
function RichText({html,onChange}){
  const ref=useRef(null);
  useEffect(()=>{if(ref.current&&ref.current.innerHTML!==(html||''))ref.current.innerHTML=html||'';},[]);
  const cmd=(c,v)=>{ref.current.focus();document.execCommand(c,false,v);onChange(ref.current.innerHTML);};
  const Btn=({c,v,children,st})=><button type="button" className="rt-b" style={st} onMouseDown={e=>e.preventDefault()} onClick={()=>cmd(c,v)}>{children}</button>;
  return(<div>
    <div className="rt-tools">
      <Btn c="bold" st={{fontWeight:800}}>B</Btn>
      <Btn c="italic" st={{fontStyle:'italic'}}>I</Btn>
      <Btn c="underline" st={{textDecoration:'underline'}}>U</Btn>
      <span className="rt-sep"/>
      <Btn c="formatBlock" v="H2">Başlık</Btn>
      <Btn c="formatBlock" v="H3">Alt Başlık</Btn>
      <Btn c="formatBlock" v="P">Paragraf</Btn>
      <span className="rt-sep"/>
      <select className="rt-b" defaultValue="" onMouseDown={e=>e.stopPropagation()} onChange={e=>{const v=e.target.value;e.target.value='';if(v)cmd('fontSize',v);}}>
        <option value="" disabled>Boyut</option>
        <option value="2">Küçük</option><option value="4">Normal</option><option value="6">Büyük</option><option value="7">Çok Büyük</option>
      </select>
      <Btn c="insertUnorderedList">• Liste</Btn>
      <Btn c="insertOrderedList">1. Liste</Btn>
      <span className="rt-sep"/>
      <Btn c="removeFormat">✕ Biçimi Temizle</Btn>
    </div>
    <div ref={ref} className="rt-edit" contentEditable suppressContentEditableWarning
      onInput={e=>onChange(e.currentTarget.innerHTML)}
      data-ph="Makalenin özeti, çıkarımlar, uygulama notları… (metni seçip yukarıdan kalın/büyük yapabilirsin)"/>
  </div>);
}

  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${esc(rec.title||L('Makale','Article'))}</title><style>
@page{size:A4 portrait;margin:18mm}
*{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}
body{font-family:'Segoe UI',-apple-system,Arial,sans-serif;color:#0f172a;font-size:13px;line-height:1.65}

</style></head><body>
<h1>${esc(rec.title||L('(başlıksız makale)','(untitled article)'))}</h1>
${rec.authorsText?`<div class="meta"><b>${L('Yazar(lar):','Author(s):')}</b> ${esc(rec.authorsText)}</div>`:''}
${(rec.journal||rec.year)?`<div class="meta">${esc([rec.journal,rec.year].filter(Boolean).join(' · '))}</div>`:''}
${rec.apa?`<div class="apa">${esc(rec.apa)}</div>`:''}
<div class="sumh">${L('Özet','Summary')}</div>
<div class="sum">${rec.summary||L('<i>Özet girilmemiş.</i>','<i>No summary entered.</i>')}</div>
</body></html>`);
  w.document.close();
