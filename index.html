/* =========================================================
   NOTION SYNC
   Pulls sRPE + Wellness data from a Cloudflare Worker proxy
   and merges it into the active team's athletes.
   ========================================================= */
const NORM=s=>(s||'').toString().trim().toUpperCase().replace(/\s+/g,' ');

async function performNotionSync(workerUrl,team){
  const base=workerUrl.replace(/\/+$/,'');
  const r=await fetch(base+'/sync');
  if(!r.ok)throw new Error(`Worker returned HTTP ${r.status}`);
  const data=await r.json();
  if(data.error)throw new Error('Worker error: '+data.error);
  const sRPE=data.sRPE||[],wellness=data.wellness||[];

  let athletes=(team.athletes||[]).map(a=>({...a,
    days:JSON.parse(JSON.stringify(a.days||{})),
    wellness:[...(a.wellness||[])],
    measurements:[...(a.measurements||[])],
    injuries:[...(a.injuries||[])],
    srpeLog:[...(a.srpeLog||[])],
  }));
  const stats={sRPERows:sRPE.length,wellnessRows:wellness.length,srpeAdded:0,srpeUpdated:0,
    wellnessAdded:0,wellnessUpdated:0,athletesCreated:0,athletesMatched:new Set()};

  const findIdx=n=>athletes.findIndex(a=>NORM(a.name)===NORM(n));
  const getOrCreate=name=>{
    let i=findIdx(name);
    if(i===-1){
      athletes.push({id:uid(),name:name.trim(),number:'',
        position:(POSITIONS[team.setup.sport]||POSITIONS.default)[0],
        dateOfBirth:'',height:'',weight:'',phone:'',photo:null,notes:'',
        injuries:[],measurements:[],wellness:[],srpeLog:[],tests:[],days:{}});
      i=athletes.length-1;stats.athletesCreated++;
    } else stats.athletesMatched.add(i);
    return athletes[i];
  };

  // ---- sRPE: each Notion row → one srpeLog entry (NOT auto-created sessions) ----
  // The coach plans team sessions manually; Notion sRPE is shown only as a chart
  // on the athlete profile so it doesn't pollute the calendar.
  const num=v=>(v==null||v==='')?null:Number(v);
  for(const row of sRPE){
    const name=row['Athlete'];
    const date=row['Date']?String(row['Date']).slice(0,10):null;
    if(!name||!date)continue;
    const ath=getOrCreate(name);
    const nid=`notion-srpe-${row._id}`;
    const tpRPE=num(row['TP RPE']),    tpDur=num(row['TP Duration']);
    const scRPE=num(row['S&C RPE']),   scDur=num(row['S&C Duration']);
    const gmRPE=num(row['Game RPE']),  gmDur=num(row['Game Duration']);
    const tpLoad=num(row['TP sRPE'])  ?? (tpRPE&&tpDur?tpRPE*tpDur:null);
    const scLoad=num(row['S&C sRPE']) ?? (scRPE&&scDur?scRPE*scDur:null);
    const gmLoad=gmRPE&&gmDur?gmRPE*gmDur:null;
    const totalLoad=num(row['Total sRPE']) ?? ((tpLoad||0)+(scLoad||0)+(gmLoad||0)||null);
    const entry={
      id:uid(),notionId:nid,date,
      tpRPE,tpDuration:tpDur,tpLoad:tpLoad?Math.round(tpLoad):null,
      scRPE,scDuration:scDur,scLoad:scLoad?Math.round(scLoad):null,
      gameRPE:gmRPE,gameDuration:gmDur,gameLoad:gmLoad?Math.round(gmLoad):null,
      totalLoad:totalLoad?Math.round(totalLoad):null,
    };
    const i=ath.srpeLog.findIndex(e=>e.notionId===nid);
    if(i>=0){entry.id=ath.srpeLog[i].id;ath.srpeLog[i]=entry;stats.srpeUpdated++;}
    else{ath.srpeLog.push(entry);stats.srpeAdded++;}
  }

  // ---- Wellness: each Notion row → entry in athlete.wellness ----
  for(const row of wellness){
    const name=row['Athlete'];
    // Strip any time portion: "2026-05-22T10:00:00+03:00" → "2026-05-22"
    const date=row['Date']?String(row['Date']).slice(0,10):null;
    if(!name||!date)continue;
    const ath=getOrCreate(name);
    const nid=`notion-w-${row._id}`;
    const i=ath.wellness.findIndex(w=>w.notionId===nid);
    const entry={id:i>=0?ath.wellness[i].id:uid(),notionId:nid,date,
      RHR:row['RHR'],sleep:row['Sleep'],fatigue:row['Fatigue'],
      soreness:(row['Soreness ']!=null?row['Soreness ']:row['Soreness']),
      areaOfPain:row['Area of Pain']||'',readiness:row['Readiness']};
    if(i>=0){ath.wellness[i]=entry;stats.wellnessUpdated++;}
    else{ath.wellness.push(entry);stats.wellnessAdded++;}
  }

  // Sort wellness by date for clean charts/tables
  athletes.forEach(a=>{
    if(a.wellness)a.wellness.sort((x,y)=>(x.date||'').localeCompare(y.date||''));
    if(a.srpeLog)a.srpeLog.sort((x,y)=>(x.date||'').localeCompare(y.date||''));
  });
  stats.athletesMatched=stats.athletesMatched.size;
  return{athletes,stats,syncedAt:data.syncedAt||new Date().toISOString()};
}

function NotionSync({data,setData,team}){
  const cfg=data.notionSync||{workerUrl:'',autoSync:false,intervalMin:5,lastSyncedAt:null,lastStats:null};
  const[url,setUrl]=useState(cfg.workerUrl);
  const[syncing,setSyncing]=useState(false);
  const[error,setError]=useState(null);
  const[stats,setStats]=useState(cfg.lastStats);
  const[lastAt,setLastAt]=useState(cfg.lastSyncedAt);

  const saveCfg=upd=>setData(prev=>({...prev,notionSync:{...(prev.notionSync||cfg),...upd}}));

  const doSync=async()=>{
    if(!cfg.workerUrl){alert('Önce Worker URL gir ve Save bas.');return;}
    setSyncing(true);setError(null);
    try{
      const{athletes,stats:s,syncedAt}=await performNotionSync(cfg.workerUrl,team);
      setData(prev=>({...prev,
        teams:prev.teams.map(t=>t.id===team.id?{...t,athletes}:t),
        notionSync:{...(prev.notionSync||cfg),lastSyncedAt:syncedAt,lastStats:s}}));
      setStats(s);setLastAt(syncedAt);
    }catch(e){setError(e.message||String(e));}
    finally{setSyncing(false);}
  };

  // Auto-sync timer
  useEffect(()=>{
    if(!cfg.autoSync||!cfg.workerUrl)return;
    const mins=Math.max(1,Number(cfg.intervalMin)||5);
    const id=setInterval(()=>{doSync();},mins*60000);
    return()=>clearInterval(id);
    // eslint-disable-next-line
  },[cfg.autoSync,cfg.workerUrl,cfg.intervalMin]);

  const lastLabel=lastAt?new Date(lastAt).toLocaleString('tr-TR'):'never';

  return(<div>
    <div className="panel">
      <h2>Notion Sync — Connection</h2>
      <div className="help" style={{marginBottom:14}}>
        Cloudflare Worker URL (the one ending in <code>.workers.dev</code>, without <code>/sync</code>).
        The Worker proxies your Notion sRPE + Wellness databases into this app.
      </div>
      <div className="grid cols-3">
        <div style={{gridColumn:'span 2'}}><label>Worker URL</label>
          <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://periodization-sync.YOURNAME.workers.dev"/></div>
        <div style={{display:'flex',alignItems:'flex-end',gap:6}}>
          <button className="btn" onClick={()=>saveCfg({workerUrl:url.trim()})}>Save URL</button>
        </div>
      </div>
      <div className="grid cols-3" style={{marginTop:14}}>
        <div>
          <label>Auto-sync</label>
          <label className="ath-chip" style={{cursor:'pointer'}}>
            <input type="checkbox" checked={!!cfg.autoSync} onChange={e=>saveCfg({autoSync:e.target.checked})}/>
            <span>{cfg.autoSync?'ON — pulls automatically':'OFF — manual only'}</span>
          </label>
        </div>
        <div><label>Interval (minutes)</label>
          <input type="number" min="1" value={cfg.intervalMin||5}
            onChange={e=>saveCfg({intervalMin:Math.max(1,+e.target.value||5)})} disabled={!cfg.autoSync}/></div>
        <div style={{display:'flex',alignItems:'flex-end',gap:6}}>
          <button className="btn" onClick={doSync} disabled={syncing||!cfg.workerUrl}>
            {syncing?'🔄 Syncing…':'🔄 Sync Now'}
          </button>
        </div>
      </div>
    </div>

    <div className="panel">
      <h2>Sync Status</h2>
      <div className="metrics">
        <div className="metric"><div className="ml">Active team</div><div className="mv" style={{fontSize:16}}>{team.setup.teamName}</div><div className="mh">Sync writes into this team</div></div>
        <div className={`metric ${error?'danger':lastAt?'ok':''}`}><div className="ml">Last sync</div><div className="mv" style={{fontSize:14}}>{lastLabel}</div><div className="mh">{error?'❌ Failed':lastAt?'✅ Success':'Not synced yet'}</div></div>
        <div className="metric"><div className="ml">Worker URL</div><div className="mv" style={{fontSize:11,wordBreak:'break-all'}}>{cfg.workerUrl||'—'}</div></div>
      </div>
      {error&&<div style={{marginTop:12,padding:12,background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',borderRadius:8,color:'var(--high-t)',fontSize:13}}>
        <strong>Error:</strong> {error}
        <div className="help" style={{marginTop:6,color:'var(--text2)'}}>
          Yaygın nedenler: Worker URL yanlış · Worker token eksik (NOTION_TOKEN) · Notion integration database'lere bağlı değil · İnternet bağlantısı yok.
        </div>
      </div>}
      {stats&&!error&&<div style={{marginTop:14}}>
        <h3 style={{fontSize:13,marginBottom:8,color:'var(--accent2)'}}>Last sync summary</h3>
        <table style={{maxWidth:560}}>
          <tbody>
            <tr><td>sRPE rows from Notion</td><td><strong>{stats.sRPERows}</strong></td></tr>
            <tr><td>Wellness rows from Notion</td><td><strong>{stats.wellnessRows}</strong></td></tr>
            <tr><td>sRPE entries added (to athlete log)</td><td><strong>{stats.srpeAdded||0}</strong></td></tr>
            <tr><td>sRPE entries updated</td><td><strong>{stats.srpeUpdated||0}</strong></td></tr>
            <tr><td>Wellness entries added</td><td><strong>{stats.wellnessAdded}</strong></td></tr>
            <tr><td>Wellness entries updated</td><td><strong>{stats.wellnessUpdated}</strong></td></tr>
            <tr><td>Athletes matched to roster</td><td><strong>{stats.athletesMatched}</strong></td></tr>
            <tr><td>Athletes auto-created (new on roster)</td><td><strong style={{color:stats.athletesCreated>0?'var(--accent2)':'inherit'}}>{stats.athletesCreated}</strong></td></tr>
          </tbody>
        </table>
      </div>}
    </div>

    <div className="panel">
      <h2>How it works</h2>
      <ul style={{paddingLeft:20,color:'var(--text2)',fontSize:13,lineHeight:1.8}}>
        <li><strong>sRPE</strong> rows are saved to each athlete's <strong>sRPE Log</strong> (shown as a chart on the athlete profile). They are <em>not</em> auto-converted to calendar sessions — the coach plans team sessions manually and assigns athletes via the Program tab.</li>
        <li><strong>Wellness</strong> rows (RHR, Sleep, Fatigue, Soreness, Readiness) are saved into each athlete's Wellness log (under Athletes → click athlete).</li>
        <li>Name matching is case-/space-insensitive. Athletes not found on the roster are <strong>auto-created</strong>.</li>
        <li>Re-syncing the same Notion row <strong>updates</strong> the existing session/entry (no duplicates) — safe to run many times.</li>
        <li>Your manual edits to other (non-Notion) sessions are never touched.</li>
      </ul>
    </div>
  </div>);
}

function Backup({data,setData,sync}){
  const fRef=useRef(null);
  const[busy,setBusy]=useState(false);
  const exp=()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');
    a.href=URL.createObjectURL(b);a.download=`periodization_backup_${fmt(today)}.json`;a.click();URL.revokeObjectURL(a.href);};
  const imp=e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(!p.teams&&!p.setup){alert('Invalid file');return;}if(confirm('Replace all data?'))setData(migrate(p));}catch{alert('Read error');}};
    r.readAsText(f);e.target.value='';};
  const restore=async()=>{
    const fb=FB();
    if(!fb||!sync||!sync.user){alert('Bulut yedeği için önce hesabınla giriş yapmalısın.');return;}
    setBusy(true);
    try{
      const bk=await cloudReadBackup(fb,sync.user.uid);
      if(!bk||!bk.str){alert('Bulutta yedek (önceki sürüm) bulunamadı.');return;}
      const p=migrate(JSON.parse(bk.str));
      const ath=(p.teams||[]).reduce((s,t)=>s+((t.athletes||[]).length),0);
      const when=bk.at&&bk.at.toDate?bk.at.toDate().toLocaleString('tr-TR'):'bilinmiyor';
      if(confirm('Önceki bulut sürümü geri yüklensin mi?\n\nYedek tarihi: '+when+'\nYedekteki sporcu sayısı: '+ath+'\n\nŞu anki veriler bununla DEĞİŞTİRİLECEK.'))setData(p);
    }catch(e){alert('Yedek okunamadı: '+(e.message||e));}
    finally{setBusy(false);}
  };
  return(<div>
    <div className="panel"><h2>All Teams Summary</h2>
      <table><thead><tr><th>Team</th><th>Sport</th><th>Season</th><th>Days planned</th><th>Athletes</th></tr></thead><tbody>
        {data.teams.map(t=><tr key={t.id}><td><strong>{t.setup.teamName}</strong>{t.id===data.activeTeamId&&<span className="tag" style={{marginLeft:8}}>ACTIVE</span>}</td>
          <td>{t.setup.sport}</td><td style={{fontSize:12}}>{fd(t.setup.seasonStart)} → {fd(t.setup.seasonEnd)}</td>
          <td>{Object.values(t.days||{}).filter(d=>d.sessions?.length).length}</td>
          <td>{(t.athletes||[]).length}</td></tr>)}
      </tbody></table>
    </div>
    <div className="panel"><h2>Backup & Restore</h2>
      <div className="help" style={{marginBottom:12}}>Export saves ALL teams (one .json file). Import replaces everything currently stored — back up first!</div>
      <div className="row">
        <button className="btn" onClick={exp}>📦 Download Full Backup</button>
        <button className="btn sec" onClick={()=>fRef.current.click()}>📂 Load Backup</button>
        <input type="file" accept=".json" ref={fRef} onChange={imp} className="hidden"/>
      </div>
    </div>
    <div className="panel"><h2>☁️ Bulut Yedeği (Otomatik)</h2>
      <div className="help" style={{marginBottom:12}}>Veriler büyük ölçüde küçüldüğünde (yanlışlıkla silme veya boş bir cihazdan giriş), bir önceki bulut sürümü otomatik olarak saklanır. Bir şeyler kaybolduysa buradan geri yükleyebilirsin.</div>
      <div className="row">
        <button className="btn" disabled={busy} onClick={restore}>{busy?'Yükleniyor…':'♻️ Önceki Bulut Sürümünü Geri Yükle'}</button>
      </div>
      {(!sync||!sync.user)&&<div className="help" style={{marginTop:10,color:'var(--warn,#f59e0b)'}}>Bu özellik için sağ üstten hesabınla giriş yapmalısın.</div>}
    </div>
  </div>);
}

/* =========================================================
   ROOT
   ========================================================= */
/* =========================================================
   CLOUD SYNC (Firebase Auth + Firestore)
   The whole app state is JSON-stringified and split into
   ~700KB chunks stored at users/{uid}/data/{i}, with a meta
   doc at users/{uid} holding {chunks,rev}. This sidesteps the
   1 MiB per-document limit (athlete photos push real data
   past 2 MB). Conflict = last-write-wins + first-login merge
   prompt. Real-time pull via onSnapshot on the meta doc (rev).
   ========================================================= */
const FB=()=>(typeof firebase!=='undefined'&&firebase.apps&&firebase.apps.length)?firebase:null;
const SYNC_CHUNK=700000;
const mkRev=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
async function cloudWrite(fb,uid,str,rev){
  const db=fb.firestore();
  const userDoc=db.collection('users').doc(uid);
  const dataCol=userDoc.collection('data');
  // Read the meta doc ONCE — it gives the previous chunk count so we never
  // re-download the whole payload just to find stale chunks (main slowdown).
  let oldN=0;
  try{
    const cur=await userDoc.get();
    if(cur.exists&&cur.data()){
      const md=cur.data();oldN=md.chunks||0;const oldSize=md.size||0;
      // SHRINK-GUARD: before drastically shrinking the cloud copy, back it up.
      if(oldN&&oldSize>5000&&str.length<oldSize*0.5){
        const bCol=userDoc.collection('backup');
        const snaps=await Promise.all(Array.from({length:oldN},(_,i)=>dataCol.doc(String(i)).get()));
        const bb=db.batch();
        snaps.forEach((d,i)=>bb.set(bCol.doc(String(i)),{c:(d.exists&&d.data())?(d.data().c||''):''}));
        bb.set(userDoc,{bChunks:oldN,bRev:md.rev||'',bSize:oldSize,bAt:fb.firestore.FieldValue.serverTimestamp()},{merge:true});
        await bb.commit();
      }
    }
  }catch(e){console.warn('backup-guard',e);}
  const n=Math.max(1,Math.ceil(str.length/SYNC_CHUNK));
  rev=rev||mkRev();
  const batch=db.batch();
  for(let i=0;i<n;i++)batch.set(dataCol.doc(String(i)),{c:str.slice(i*SYNC_CHUNK,(i+1)*SYNC_CHUNK)});
  batch.set(userDoc,{chunks:n,rev:rev,size:str.length,updatedAt:fb.firestore.FieldValue.serverTimestamp()},{merge:true});
  await batch.commit();
  // Drop leftover chunks ONLY when the payload shrank — by reference, no read.
  if(oldN>n){const b=db.batch();for(let i=n;i<oldN;i++)b.delete(dataCol.doc(String(i)));await b.commit();}
  return rev;
}
async function cloudRead(fb,uid){
  const db=fb.firestore();
  const userDoc=db.collection('users').doc(uid);
  const meta=await userDoc.get();
  if(!meta.exists||!meta.data()||!meta.data().chunks)return null;
  const md=meta.data(),n=md.chunks,parts=[];
  for(let i=0;i<n;i++){const d=await userDoc.collection('data').doc(String(i)).get();parts.push((d.exists&&d.data())?(d.data().c||''):'');}
  return{str:parts.join(''),rev:md.rev};
}
async function cloudReadBackup(fb,uid){
  const db=fb.firestore();
  const userDoc=db.collection('users').doc(uid);
  const meta=await userDoc.get();
  if(!meta.exists||!meta.data()||!meta.data().bChunks)return null;
  const md=meta.data(),n=md.bChunks,parts=[];
  for(let i=0;i<n;i++){const d=await userDoc.collection('backup').doc(String(i)).get();parts.push((d.exists&&d.data())?(d.data().c||''):'');}
  return{str:parts.join(''),rev:md.bRev,size:md.bSize||0,at:md.bAt};
}
// "real data" = this device actually has athletes / planned days / exercises,
// not just the empty default template. Used to decide sync direction safely.
function hasRealData(d){
  if(!d||!Array.isArray(d.teams))return false;
  if(d.teams.some(t=>(t.athletes&&t.athletes.length)||(t.days&&Object.keys(t.days).length)))return true;
  if(Array.isArray(d.exercises)&&d.exercises.length)return true;
  return false;
}
function useCloudSync(data,setData){
  const[user,setUser]=useState(null);
  const[status,setStatus]=useState('offline'); // offline|syncing|synced|error
  const lastJson=useRef(null);
  const lastRev=useRef(null);
  const dataRef=useRef(data); dataRef.current=data;
  const timer=useRef(null);
  const ready=useRef(false); // true only AFTER the cloud has been reconciled on login

  // auth state
  useEffect(()=>{
    const fb=FB(); if(!fb)return;
    return fb.auth().onAuthStateChanged(u=>{
      setUser(u||null);
      if(!u){setStatus('offline');lastJson.current=null;lastRev.current=null;ready.current=false;}
    });
  },[]);

  // subscribe to cloud (meta doc) on login
  useEffect(()=>{
    const fb=FB(); if(!fb||!user)return;
    setStatus('syncing');
    ready.current=false; // block uploads until the first cloud reconcile finishes
    const userDoc=fb.firestore().collection('users').doc(user.uid);
    let first=true;
    const seed=async str=>{const rev=mkRev();lastRev.current=rev;lastJson.current=str;try{await cloudWrite(fb,user.uid,str,rev);setStatus('synced');}catch(e){console.warn('seed',e);setStatus('error');}};
    const unsub=userDoc.onSnapshot(async snap=>{
      try{
        const rev=(snap.exists&&snap.data())?snap.data().rev:null;
        if(first){
          first=false;
          const localStr=JSON.stringify(dataRef.current);
          const cloud=await cloudRead(fb,user.uid);
          const localReal=hasRealData(dataRef.current);
          if(cloud&&cloud.str){
            // Cloud is the source of truth: on login ALWAYS show the cloud copy.
            // This is predictable and a stale/empty device can never overwrite the account.
            if(cloud.str===localStr){
              lastJson.current=cloud.str;lastRev.current=cloud.rev;setStatus('synced');
            }else{
              const p=migrate(JSON.parse(cloud.str));lastJson.current=JSON.stringify(p);lastRev.current=cloud.rev;setData(p);setStatus('synced');
            }
          }else{
            // brand-new account: cloud is empty.
            if(localReal){
              const keepLocal=window.confirm('Bu hesapta bulutta veri yok.\n\nTAMAM = şu an ekrandaki verileri bu hesaba yükle\nİPTAL = TEMİZ / boş sayfa ile başla');
              if(keepLocal){await seed(localStr);}
              else{const def=migrate(makeDefault());const defStr=JSON.stringify(def);setData(def);await seed(defStr);}
            }else{
              // Empty device + empty cloud: just start. Don't push an empty payload up.
              lastJson.current=localStr;setStatus('synced');
            }
          }
          ready.current=true; // cloud reconciled — uploads from this device are now safe
        }else if(rev&&rev!==lastRev.current){
          // A genuinely remote change (different device). Our own writes are skipped
          // because the writer claims its rev BEFORE committing.
          const cloud=await cloudRead(fb,user.uid);
          if(cloud&&cloud.str){
            const p=migrate(JSON.parse(cloud.str));const pstr=JSON.stringify(p);
            lastJson.current=pstr;lastRev.current=cloud.rev;
            if(pstr!==JSON.stringify(dataRef.current))setData(p);
            setStatus('synced');
          }
        }
      }catch(e){console.warn('sync',e);setStatus('error');}
    },err=>{console.warn('sync sub',err);setStatus('error');});
    return unsub;
  },[user]);

  // write local changes up (debounced)
  useEffect(()=>{
    const fb=FB(); if(!fb||!user)return;
    if(timer.current){clearTimeout(timer.current);timer.current=null;} // cancel any pending (possibly stale) write
    if(!ready.current)return;          // don't upload until the cloud has been reconciled on login
    const j=JSON.stringify(data);
    if(j===lastJson.current)return;
    setStatus('syncing');
    timer.current=setTimeout(async()=>{
      const rev=mkRev();
      lastRev.current=rev;lastJson.current=j;   // claim rev BEFORE writing so our own snapshot is ignored
      try{await cloudWrite(fb,user.uid,j,rev);setStatus('synced');}
      catch(e){console.warn('write',e);setStatus('error');}
    },800);
  },[data,user]);

  return{user,status,
    signIn:(e,p)=>FB().auth().signInWithEmailAndPassword(e,p),
    signUp:(e,p)=>FB().auth().createUserWithEmailAndPassword(e,p),
    signOut:()=>FB().auth().signOut()};
}

function videoEmbed(src){
  if(!src)return null;
  if(src.startsWith('data:'))return{kind:'file',src};
  let m;
  if((m=src.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{6,})/)))return{kind:'iframe',src:'https://www.youtube.com/embed/'+m[1]};
  if((m=src.match(/vimeo\.com\/(?:video\/)?(\d+)/)))return{kind:'iframe',src:'https://player.vimeo.com/video/'+m[1]};
  if(/\.(mp4|webm|ogg|mov|m4v)(\?|$)/i.test(src))return{kind:'file',src};
  if(/^https?:\/\//i.test(src))return{kind:'iframe',src};
  return null;
}
// Derive a cover-image URL from a video link (YouTube / Vimeo). Returns '' if none.
function videoThumb(src){
  if(!src)return'';
  let m;
  if((m=src.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{6,})/)))return'https://img.youtube.com/vi/'+m[1]+'/hqdefault.jpg';
  if((m=src.match(/vimeo\.com\/(?:video\/)?(\d+)/)))return'https://vumbnail.com/'+m[1]+'.jpg';
  return'';
}

function VideoPlayer({ex}){

  return<iframe className="ex-video" src={v.src} title="exercise video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen frameBorder="0"/>;
}

          <div className="help" style={{marginTop:4}}>Önerilen yöntem — link her cihazda sorunsuz açılır ve hafıza yemez. YouTube/Vimeo linkinde kapak otomatik gelir.</div>

    <div className="ex-grid">{list.map(e=><ExerciseCard key={e.id} ex={e} onOpen={()=>setOpenId(e.id)}/>)}</div>

  </div>);
}

/* =========================================================
   RESEARCHES — article-summary blog (auto APA via CrossRef)
   ========================================================= */
async function fetchCrossref(input){
  const m=(input||'').match(/10\.\d{4,9}\/[^\s"<>]+/i);
  if(!m)throw new Error('DOI bulunamadı — makalenin DOI içeren linkini ya da DOI’sini gir (ör. 10.1234/abcd).');
  const doi=m[0].replace(/[).,;]+$/,'');
  const r=await fetch('https://api.crossref.org/works/'+encodeURIComponent(doi),{headers:{'Accept':'application/json'}});
  if(!r.ok)throw new Error('CrossRef HTTP '+r.status);
  const w=(await r.json()).message;
  const dp=((w.issued||w['published']||w['published-print']||w['published-online']||{})['date-parts']||[[]])[0]||[];
  return{doi,url:w.URL||input,
    authors:(w.author||[]).map(a=>({family:a.family||'',given:a.given||''})),
    year:dp[0]||'',date:dp.join('-'),
    title:(w.title&&w.title[0])||'',journal:(w['container-title']&&w['container-title'][0])||'',
    volume:w.volume||'',issue:w.issue||'',page:w.page||''};
}
function apaCite(m){
  const fmtA=a=>{const ini=(a.given||'').split(/[\s.]+/).filter(Boolean).map(s=>s[0].toUpperCase()+'.').join(' ');return (a.family||'')+(ini?', '+ini:'');};
  const A=m.authors||[];let auth='';
  if(A.length===1)auth=fmtA(A[0]);
  else if(A.length>=2&&A.length<=20)auth=A.slice(0,-1).map(fmtA).join(', ')+', & '+fmtA(A[A.length-1]);
  else if(A.length>20)auth=A.slice(0,19).map(fmtA).join(', ')+', … '+fmtA(A[A.length-1]);
  const yr=m.year?`(${m.year}).`:'(n.d.).';
  const title=m.title?(m.title.replace(/\s*\.\s*$/,'')+'.'):'';
  let src='';
  if(m.journal){src=m.journal+(m.volume?`, ${m.volume}`:'')+(m.issue?`(${m.issue})`:'')+(m.page?`, ${m.page}`:'')+'.';}
  const link=m.doi?`https://doi.org/${m.doi}`:(m.url||'');
  return [auth,yr,title,src,link].filter(Boolean).join(' ').replace(/\s+/g,' ').trim();
}
function authorsLine(m){
  const A=m.authors||[];if(!A.length)return m.authorsText||'';
  return A.map(a=>[a.given,a.family].filter(Boolean).join(' ')).join(', ');
}
// Minimal rich-text editor (contentEditable + execCommand) — stores HTML.
function RichText({html,onChange}){
  const ref=useRef(null);
  useEffect(()=>{if(ref.current&&ref.current.innerHTML!==(html||''))ref.current.innerHTML=html||'';},[]);
  const cmd=(c,v)=>{ref.current.focus();document.execCommand(c,false,v);onChange(ref.current.innerHTML);};
  const Btn=({c,v,children,st})=><button type="button" className="rt-b" style={st} onMouseDown={e=>e.preventDefault()} onClick={()=>cmd(c,v)}>{children}</button>;
  return(<div>
    <div className="rt-tools">
      <Btn c="bold" st={{fontWeight:800}}>B</Btn>
      <Btn c="italic" st={{fontStyle:'italic'}}>I</Btn>
      <Btn c="underline" st={{textDecoration:'underline'}}>U</Btn>
      <span className="rt-sep"/>
      <Btn c="formatBlock" v="H2">Başlık</Btn>
      <Btn c="formatBlock" v="H3">Alt Başlık</Btn>
      <Btn c="formatBlock" v="P">Paragraf</Btn>
      <span className="rt-sep"/>
      <select className="rt-b" defaultValue="" onMouseDown={e=>e.stopPropagation()} onChange={e=>{const v=e.target.value;e.target.value='';if(v)cmd('fontSize',v);}}>
        <option value="" disabled>Boyut</option>
        <option value="2">Küçük</option><option value="4">Normal</option><option value="6">Büyük</option><option value="7">Çok Büyük</option>
      </select>
      <Btn c="insertUnorderedList">• Liste</Btn>
      <Btn c="insertOrderedList">1. Liste</Btn>
      <span className="rt-sep"/>
      <Btn c="removeFormat">✕ Biçimi Temizle</Btn>
    </div>
    <div ref={ref} className="rt-edit" contentEditable suppressContentEditableWarning
      onInput={e=>onChange(e.currentTarget.innerHTML)}
      data-ph="Makalenin özeti, çıkarımlar, uygulama notları… (metni seçip yukarıdan kalın/büyük yapabilirsin)"/>
  </div>);
}
// Print a single research note on A4 (title, authors, APA, formatted summary).
function printResearch(rec){
  const w=window.open('','_blank','width=900,height=1100');
  if(!w){alert('Pop-up engellendi — tarayıcıdan bu site için pop-up iznini aç.');return;}
  const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${esc(rec.title||'Makale')}</title><style>
@page{size:A4 portrait;margin:18mm}
*{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}
body{font-family:'Segoe UI',-apple-system,Arial,sans-serif;color:#0f172a;font-size:13px;line-height:1.65}
h1{font-size:23px;font-weight:800;margin-bottom:8px;line-height:1.2}
.meta{font-size:12px;color:#475569;margin-bottom:2px}
.apa{font-size:12px;color:#334155;background:#f1f5f9;border-left:3px solid #0891b2;padding:10px 12px;border-radius:6px;margin:14px 0;word-break:break-word}
.sumh{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#0891b2;margin:20px 0 8px;border-bottom:2px solid #e5e7eb;padding-bottom:5px}
.sum{font-size:13px}
.sum h2{font-size:18px;margin:.5em 0}.sum h3{font-size:15px;margin:.5em 0}.sum ul,.sum ol{padding-left:22px;margin:.4em 0}
</style></head><body>
<h1>${esc(rec.title||'(başlıksız makale)')}</h1>
${rec.authorsText?`<div class="meta"><b>Yazar(lar):</b> ${esc(rec.authorsText)}</div>`:''}
${(rec.journal||rec.year)?`<div class="meta">${esc([rec.journal,rec.year].filter(Boolean).join(' · '))}</div>`:''}
${rec.apa?`<div class="apa">${esc(rec.apa)}</div>`:''}
<div class="sumh">Özet</div>
<div class="sum">${rec.summary||'<i>Özet girilmemiş.</i>'}</div>
</body></html>`);
  w.document.close();
  setTimeout(()=>{try{w.focus();w.print();}catch(e){}},300);
}
function ResearchModal({rec,onChange,onDelete,onClose}){
  const set=(k,v)=>onChange({[k]:v});
  const[busy,setBusy]=useState(false);const[err,setErr]=useState('');
  const fetchMeta=async()=>{
    setErr('');setBusy(true);
    try{const m=await fetchCrossref(rec.url||rec.doi);
      onChange({doi:m.doi,url:m.url,year:String(m.year||''),date:m.date,journal:m.journal,
        authors:m.authors,authorsText:authorsLine(m),apa:apaCite(m)});
    }catch(e){setErr(e.message||String(e));}finally{setBusy(false);}
  };
  return(<div className="modal-bg" onClick={onClose}>
    <div className="modal ex-modal rs-modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-head">
        <input className="ex-title-in" value={rec.title} placeholder="Makale başlığını elle yaz…" onChange={e=>set('title',e.target.value)}/>
        <button className="x-btn" onClick={onClose}>✕</button>
      </div>
      <div className="ex-modal-body">
        <div>
          <label>Makale Linki / DOI</label>
          <div className="row" style={{gap:8,flexWrap:'nowrap'}}>
            <input value={rec.url} onChange={e=>set('url',e.target.value)} placeholder="https://doi.org/10.1234/… ya da DOI"/>
            <button className="btn sm" disabled={busy} onClick={fetchMeta} style={{whiteSpace:'nowrap'}}>{busy?'Alınıyor…':'⤓ Bilgileri Getir'}</button>
          </div>
          <div className="help" style={{marginTop:4}}>Linki yapıştırıp <b>Bilgileri Getir</b>’e bas — yazarlar, tarih ve APA otomatik dolar (DOI’li makalelerde).</div>
          {err&&<div className="help" style={{marginTop:6,color:'#dc2626'}}>{err}</div>}
        </div>
        <div className="grid cols-2" style={{marginTop:14}}>
          <div><label>Yazar(lar)</label><input value={rec.authorsText||''} onChange={e=>set('authorsText',e.target.value)} placeholder="Surname, N., …"/></div>
          <div><label>Yıl / Tarih</label><input value={rec.year||''} onChange={e=>set('year',e.target.value)} placeholder="2024"/></div>
        </div>
        <div style={{marginTop:14}}><label>Dergi</label><input value={rec.journal||''} onChange={e=>set('journal',e.target.value)} placeholder="Journal of …"/></div>
        <div style={{marginTop:14}}><label>APA Kaynakça</label>
          <textarea value={rec.apa||''} onChange={e=>set('apa',e.target.value)} placeholder="Otomatik oluşur — düzenleyebilirsin." style={{minHeight:70}}/></div>
        <div style={{marginTop:14}}><label>Etiketler (virgülle)</label><input value={rec.tags||''} onChange={e=>set('tags',e.target.value)} placeholder="kuvvet, ACWR, yaralanma…"/></div>
        <div style={{marginTop:16}}><label>Özet / Blog</label>
          <RichText html={rec.summary} onChange={v=>set('summary',v)}/></div>
      </div>
      <div className="modal-foot">
        <button className="btn danger sm" onClick={onDelete}>Sil</button>
        <div className="row" style={{gap:8}}>
          <button className="btn sec sm" onClick={()=>printResearch(rec)}>🖨 Yazdır (A4)</button>
          <button className="btn sm" onClick={onClose}>Bitti</button>
        </div>
      </div>
    </div>
  </div>);
}
function ResearchCard({rec,onOpen}){
  const tags=(rec.tags||'').split(',').map(s=>s.trim()).filter(Boolean);
  return(<div className="ex-card rs-card" onClick={onOpen}>
    <div className="ex-cbody">
      <div className="ex-cname">{rec.title||'(başlıksız makale)'}</div>
      <div className="rs-meta">{[rec.authorsText,rec.year].filter(Boolean).join(' · ')||'—'}</div>
      {rec.journal&&<div className="rs-jr">{rec.journal}</div>}
      <div className="ex-ctags">{tags.slice(0,4).map((t,i)=><span key={i} className="ex-tag">{t}</span>)}</div>
    </div>
  </div>);
}
function ResearchesView({data,setData}){
  const items=data.researches||[];
  const setItems=arr=>setData({...data,researches:arr});
  const[q,setQ]=useState('');const[openId,setOpenId]=useState(null);
  const add=()=>{const r={id:uid(),title:'',url:'',doi:'',authors:[],authorsText:'',year:'',date:'',journal:'',apa:'',summary:'',tags:'',addedAt:Date.now()};setItems([r,...items]);setOpenId(r.id);};
  const patch=(id,p)=>setItems(items.map(r=>r.id===id?{...r,...p}:r));
  const remove=id=>{if(window.confirm('Bu makale silinsin mi?')){setItems(items.filter(r=>r.id!==id));setOpenId(null);}};
  const ql=q.toLowerCase();
  const list=items.filter(r=>!q||(r.title||'').toLowerCase().includes(ql)||(r.authorsText||'').toLowerCase().includes(ql)||(r.tags||'').toLowerCase().includes(ql)||(r.summary||'').toLowerCase().includes(ql));
  const open=items.find(r=>r.id===openId);
  return(<div className="ex-wrap">
    <div className="ex-top">
      <div><h1 className="ex-h1">Researches</h1><div className="sub">Makale özetleri & APA kaynakçası — link yapıştır, bilgiler otomatik gelsin.</div></div>
    </div>
    <div className="ex-toolbar">
      <div className="ex-search"><span>🔍</span><input value={q} onChange={e=>setQ(e.target.value)} placeholder="Makale ara…"/></div>
      <button className="btn sm" onClick={add}>＋ Makale Ekle</button>
    </div>
    {list.length===0&&<div className="ex-empty">Henüz makale yok. <b>＋ Makale Ekle</b> ile ilk özeti oluştur — DOI linkini yapıştırınca yazar/tarih/APA otomatik yazılır.</div>}
    <div className="ex-grid rs-grid">{list.map(r=><ResearchCard key={r.id} rec={r} onOpen={()=>setOpenId(r.id)}/>)}</div>
    {open&&<ResearchModal rec={open} onChange={p=>patch(open.id,p)} onDelete={()=>remove(open.id)} onClose={()=>setOpenId(null)}/>}
  </div>);
}

function App(){
  const[data,setData]=useLocal('pp-data',makeDefault());
  const sync=useCloudSync(data,setData);
  const[authOpen,setAuthOpen]=useState(false);
  const[view,setView]=useState('setup');
  const[selected,setSelected]=useState({year:today.getFullYear(),month:today.getMonth()+1,date:fmt(today)});
  const[dayKey,setDayKey]=useState(fmt(today));

  const team=useMemo(()=>data.teams.find(t=>t.id===data.activeTeamId)||data.teams[0],[data]);
  const updateTeam=(id,upd)=>setData({...data,teams:data.teams.map(t=>t.id===id?{...t,...upd}:t)});

  const periods=useMemo(()=>getPeriods(team.setup),[team.setup]);
  const weeks=useMemo(()=>buildWeeks(team.setup,periods,team.weekOverrides),[team.setup,periods,team.weekOverrides]);
  const goDayView=k=>{setDayKey(k);setView('program');};

  const TABS=[{id:'setup',label:'Setup'},{id:'season',label:'Season Plan'},{id:'calendar',label:'Calendar'},
    {id:'program',label:'Program'},{id:'athletes',label:'Athletes'},{id:'exercises',label:'Exercises'},{id:'researches',label:'Researches'},{id:'reports',label:'Reports'},
    {id:'notion',label:'🔗 Notion Sync'},{id:'teams',label:'Teams'},{id:'backup',label:'Backup'}];

  return(<div className="app">
    <datalist id="lib-exercises">{[...new Set((data.exercises||[]).map(e=>e.name).filter(Boolean))].map((n,i)=><option key={i} value={n}/>)}</datalist>
    <aside className="sidebar">
      <div className="brand"><img className="brand-logo" src="logo.png" alt="Tofaş"/></div>
      <nav>{TABS.map(t=><button key={t.id} className={view===t.id?'active':''} onClick={()=>setView(t.id)}>{t.label}</button>)}</nav>
    </aside>
    <div className="content">
    <header>
      <div>
        <h1>PERIODIZATION PLANNER</h1>
        <div className="sub">{team.setup.sport} · {team.setup.model} model · season {fd(team.setup.seasonStart)} → {fd(team.setup.seasonEnd)}</div>
      </div>
      <div className="row">
        <div className="team-sw">
          <span style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.5px'}}>Team</span>
          <select value={data.activeTeamId} onChange={e=>setData({...data,activeTeamId:e.target.value})}>
            {data.teams.map(t=><option key={t.id} value={t.id}>{t.setup.teamName}</option>)}
          </select>
        </div>
        <button className="btn sec sm" onClick={()=>setView('teams')}>Manage</button>
        <CloudBar sync={sync} onOpen={()=>setAuthOpen(true)}/>
      </div>
    </header>
    {authOpen&&<AuthModal sync={sync} onClose={()=>setAuthOpen(false)}/>}
    <main key={view+team.id}>
      {view==='setup'&&<Setup team={team} updateTeam={updateTeam}/>}
      {view==='season'&&<SeasonPlan team={team} updateTeam={updateTeam} periods={periods} weeks={weeks}/>}
      {view==='calendar'&&<CalendarView days={team.days} selected={selected} setSelected={setSelected} goDayView={goDayView} weeks={weeks}/>}
      {view==='program'&&<Planner days={team.days} setup={team.setup} dateKey={dayKey} setDateKey={setDayKey} labelOwner={team.setup.teamName}
        athletes={team.athletes||[]}
        saveDays={d=>setData(prev=>({...prev,teams:prev.teams.map(t=>t.id===team.id?{...t,days:d}:t)}))}
        saveAthletes={a=>setData(prev=>({...prev,teams:prev.teams.map(t=>t.id===team.id?{...t,athletes:a}:t)}))}/>}
      {view==='athletes'&&<Athletes team={team} updateTeam={updateTeam} weeks={weeks}/>}
      {view==='exercises'&&<ExercisesView data={data} setData={setData}/>}
      {view==='researches'&&<ResearchesView data={data} setData={setData}/>}
      {view==='reports'&&<TeamReports team={team} weeks={weeks} selected={selected} setSelected={setSelected}/>}
      {view==='teams'&&<TeamsPanel data={data} setData={setData}/>}
      {view==='notion'&&<NotionSync data={data} setData={setData} team={team}/>}
      {view==='backup'&&<Backup data={data} setData={setData} sync={sync}/>}
    </main>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
