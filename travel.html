<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback}=React;

/* ============================ Sabitler ============================ */
const EMOJIS=[
  {e:'📍',label:'Genel'},{e:'❤️',label:'Favori'},{e:'⭐',label:'Gidilecek'},{e:'✅',label:'Gidildi'},
  {e:'🍽️',label:'Restoran'},{e:'☕',label:'Kafe'},{e:'🍺',label:'Bar'},{e:'🏨',label:'Otel'},
  {e:'🏛️',label:'Müze'},{e:'🏖️',label:'Plaj'},{e:'⛰️',label:'Dağ'},{e:'🌳',label:'Park'},
  {e:'🛍️',label:'Alışveriş'},{e:'🎭',label:'Eğlence'},{e:'🏞️',label:'Doğa'},{e:'🗺️',label:'Görülecek'},
  {e:'🕌',label:'İbadet'},{e:'🎡',label:'Lunapark'},{e:'🍷',label:'Şarap'},{e:'📸',label:'Manzara'},
  {e:'🏰',label:'Tarihi'},{e:'🚗',label:'Yol'},{e:'🏕️',label:'Kamp'},{e:'✈️',label:'Havalimanı'}
];
const emojiLabel=e=>(EMOJIS.find(x=>x.e===e)||{}).label||'';

/* ============================ Yardımcılar ============================ */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const makeDefault=()=>({places:[],_v:1});
const hasRealData=d=>!!(d&&Array.isArray(d.places)&&d.places.length);

// Fotoğrafı küçült + JPEG'e çevir (bulut senkronizasyonunu hafif tut)
function compressImage(file,maxDim=1280,quality=0.72){
  return new Promise((resolve,reject)=>{
    const fr=new FileReader();
    fr.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let {width:w,height:h}=img;
        if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
        else if(h>=w&&h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',quality));
      };
      img.onerror=reject;img.src=fr.result;
    };
    fr.onerror=reject;fr.readAsDataURL(file);
  });
}

const stars=(n)=>'★'.repeat(n)+'☆'.repeat(5-n);

/* ============================ Bulut Senkronizasyonu ============================ */
// periodization-planner ile aynı parçalı Firestore modeli, ayrı koleksiyon: seyahat_verileri
const FB=()=>(typeof firebase!=='undefined'&&firebase.apps&&firebase.apps.length)?firebase:null;
const CHUNK_SIZE=400000;
const splitChunks=s=>{const a=[];for(let i=0;i<s.length;i+=CHUNK_SIZE)a.push(s.slice(i,i+CHUNK_SIZE));return a.length?a:[''];};

function useCloudSync(data,setData){
  const[user,setUser]=useState(null);
  const[authLoading,setAuthLoading]=useState(true);
  const[status,setStatus]=useState('offline');
  const[authErr,setAuthErr]=useState('');
  const dataRef=useRef(data);dataRef.current=data;
  const userRef=useRef(null);userRef.current=user;
  const prevUid=useRef(null);
  const ready=useRef(false);
  const lastSynced=useRef(null);
  const prevN=useRef(0);
  const timer=useRef(null);
  const COL='seyahat_verileri';

  const assemble=(manifest,chunks)=>{
    const n=manifest.n,rev=manifest.rev,parts=[];
    for(let i=0;i<n;i++){const ch=chunks[i];if(!ch||ch.rev!==rev)return null;parts.push(ch.c);}
    return parts.join('');
  };

  const writeNow=useCallback(async()=>{
    if(timer.current){clearTimeout(timer.current);timer.current=null;}
    const fb=FB();const u=userRef.current;
    if(!fb||!u||!ready.current)return;
    const json=JSON.stringify(dataRef.current);
    if(json===lastSynced.current){setStatus('synced');return;}
    setStatus('syncing');
    try{
      const col=fb.firestore().collection(COL);
      const parts=splitChunks(json);const n=parts.length;const rev=Date.now();
      const ops=[];
      parts.forEach((c,i)=>ops.push({set:1,id:u.uid+'_'+i,data:{userId:u.uid,i,c,rev}}));
      for(let i=n;i<prevN.current;i++)ops.push({del:1,id:u.uid+'_'+i});
      for(let i=0;i<ops.length;i+=450){
        const b=fb.firestore().batch();
        ops.slice(i,i+450).forEach(o=>{if(o.set)b.set(col.doc(o.id),o.data);else b.delete(col.doc(o.id));});
        await b.commit();
      }
      await col.doc(u.uid).set({userId:u.uid,n,rev});
      prevN.current=n;lastSynced.current=json;
      setStatus('synced');
    }catch(e){console.warn('write',e);setStatus('error');}
  },[]);

  // Auth durumu
  useEffect(()=>{
    const fb=FB();
    if(!fb){setAuthLoading(false);return;}
    fb.auth().getRedirectResult().catch(e=>{
      const m={'auth/unauthorized-domain':'Bu adres Firebase\'de yetkili değil. Authentication → Settings → Authorized domains listesine ekle.',
        'auth/operation-not-allowed':'Google girişi Firebase Console\'da etkin değil.',
        'auth/network-request-failed':'İnternet bağlantısı hatası.'}[e.code]||(e.code?e.code+': '+e.message:e.message);
      setAuthErr(m);
    });
    return fb.auth().onAuthStateChanged(u=>{
      setAuthLoading(false);
      if(!u){
        ready.current=false;lastSynced.current=null;prevUid.current=null;prevN.current=0;
        if(timer.current){clearTimeout(timer.current);timer.current=null;}
        setData(makeDefault());setStatus('offline');setUser(null);return;
      }
      if(prevUid.current&&prevUid.current!==u.uid){ready.current=false;lastSynced.current=null;prevN.current=0;setData(makeDefault());}
      prevUid.current=u.uid;setUser(u);
    });
  },[]);

  // Canlı dinleyici
  useEffect(()=>{
    const fb=FB();if(!fb||!user)return;
    setStatus('syncing');ready.current=false;lastSynced.current=null;prevN.current=0;
    if(timer.current){clearTimeout(timer.current);timer.current=null;}
    const unsub=fb.firestore().collection(COL).where('userId','==',user.uid)
      .onSnapshot(snap=>{
        try{
          if(snap.metadata&&snap.metadata.hasPendingWrites)return;
          let manifest=null;const chunks={};
          snap.forEach(d=>{const v=d.data();if(!v)return;
            if(d.id===user.uid&&typeof v.n==='number')manifest=v;
            else if(typeof v.i==='number'&&typeof v.c==='string')chunks[v.i]=v;});
          if(manifest){
            const json=assemble(manifest,chunks);
            if(json==null)return;
            ready.current=true;prevN.current=manifest.n;
            if(json===lastSynced.current){setStatus('synced');return;}
            lastSynced.current=json;
            let parsed;try{parsed=JSON.parse(json);}catch(e){return;}
            if(JSON.stringify(parsed)!==JSON.stringify(dataRef.current)){dataRef.current=parsed;setData(parsed);}
            setStatus('synced');
          }else{
            if(snap.metadata&&snap.metadata.fromCache)return;
            ready.current=true;
            if(hasRealData(dataRef.current)){lastSynced.current=null;writeNow();}
            else{lastSynced.current=JSON.stringify(dataRef.current);setStatus('synced');}
          }
        }catch(e){console.warn('sync',e);setStatus('error');}
      },err=>{console.warn('sync sub',err);setStatus('error');});
    return unsub;
  },[user,writeNow]);

  // Sekme kapanınca yazımı gönder
  useEffect(()=>{
    const fb=FB();if(!fb||!user)return;
    const flush=()=>{if(timer.current){clearTimeout(timer.current);timer.current=null;}writeNow();};
    const onVis=()=>{if(document.visibilityState==='hidden')flush();};
    document.addEventListener('visibilitychange',onVis);
    window.addEventListener('pagehide',flush);
    return()=>{document.removeEventListener('visibilitychange',onVis);window.removeEventListener('pagehide',flush);};
  },[user,writeNow]);

  // Debounce yazım
  useEffect(()=>{
    const fb=FB();if(!fb||!user||!ready.current)return;
    if(timer.current){clearTimeout(timer.current);timer.current=null;}
    if(JSON.stringify(data)===lastSynced.current)return;
    setStatus('syncing');
    timer.current=setTimeout(()=>writeNow(),300);
  },[data,user,writeNow]);

  return{user,status,authLoading,authErr,
    signInWithGoogle:async()=>{
      const p=new firebase.auth.GoogleAuthProvider();
      p.setCustomParameters({prompt:'select_account'});
      try{return await FB().auth().signInWithPopup(p);}
      catch(e){
        const toRedirect=['auth/popup-closed-by-user','auth/cancelled-popup-request','auth/popup-blocked',
          'auth/web-storage-unsupported','auth/operation-not-supported-in-this-environment','auth/internal-error'];
        if(toRedirect.includes(e.code)){await FB().auth().signInWithRedirect(p);return;}
        throw e;
      }
    },
    signOut:async()=>{try{await writeNow();}catch(e){}return FB().auth().signOut();}
  };
}

/* ============================ Geocoding (Nominatim / OSM) ============================ */
async function geocode(q){
  const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=6&accept-language=tr&q='+encodeURIComponent(q),
    {headers:{'Accept':'application/json'}});
  if(!r.ok)return[];
  return await r.json();
}
async function reverseGeocode(lat,lng){
  try{
    const r=await fetch('https://nominatim.openstreetmap.org/reverse?format=json&accept-language=tr&lat='+lat+'&lon='+lng);
    if(!r.ok)return'';
    const j=await r.json();
    const a=j.address||{};
    return a.attraction||a.tourism||a.amenity||a.shop||a.building||a.road||j.display_name?.split(',')[0]||'';
  }catch(e){return'';}
}

/* ============================ Harita ============================ */
function MapView({places,onMapClick,focusId,onMarkerClick,flyTo}){
  const elRef=useRef(null);
  const mapRef=useRef(null);
  const layerRef=useRef(null);
  const clickRef=useRef(onMapClick);clickRef.current=onMapClick;
  const markerClickRef=useRef(onMarkerClick);markerClickRef.current=onMarkerClick;

  // init
  useEffect(()=>{
    if(mapRef.current||!elRef.current)return;
    const map=L.map(elRef.current,{zoomControl:true,attributionControl:true})
      .setView([39.0,35.0],5); // Türkiye merkezli başlangıç
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
      attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19,subdomains:'abcd'
    }).addTo(map);
    map.on('click',e=>clickRef.current&&clickRef.current(e.latlng.lat,e.latlng.lng));
    layerRef.current=L.layerGroup().addTo(map);
    mapRef.current=map;
    setTimeout(()=>map.invalidateSize(),200);
  },[]);

  // markerları çiz
  useEffect(()=>{
    const map=mapRef.current,layer=layerRef.current;if(!map||!layer)return;
    layer.clearLayers();
    places.forEach(p=>{
      const rate=p.rating?`<span class="pin-rate">${'★'.repeat(p.rating)}</span>`:'';
      const icon=L.divIcon({className:'',html:`<div class="emoji-marker">${p.emoji||'📍'}<br>${rate}</div>`,
        iconSize:[34,40],iconAnchor:[17,34]});
      const m=L.marker([p.lat,p.lng],{icon,title:p.name});
      m.on('click',()=>markerClickRef.current&&markerClickRef.current(p.id));
      m.addTo(layer);
    });
  },[places]);

  // odaklan
  useEffect(()=>{
    const map=mapRef.current;if(!map||!focusId)return;
    const p=places.find(x=>x.id===focusId);
    if(p)map.flyTo([p.lat,p.lng],Math.max(map.getZoom(),14),{duration:.6});
  },[focusId]);

  // dış konuma uç (arama)
  useEffect(()=>{
    const map=mapRef.current;if(!map||!flyTo)return;
    map.flyTo([flyTo.lat,flyTo.lng],flyTo.zoom||14,{duration:.7});
  },[flyTo]);

  return <div id="map" ref={elRef}/>;
}

/* ============================ Yıldız girişi ============================ */
function StarInput({value,onChange}){
  const[hover,setHover]=useState(0);
  return(
    <div className="stars-input" onMouseLeave={()=>setHover(0)}>
      {[1,2,3,4,5].map(n=>(
        <span key={n} className={(hover||value)>=n?'on':''}
          onMouseEnter={()=>setHover(n)}
          onClick={()=>onChange(value===n?0:n)}>★</span>
      ))}
    </div>
  );
}

/* ============================ Ekle / Düzenle modalı ============================ */
function PlaceModal({initial,coord,onSave,onClose,onDelete}){
  const[name,setName]=useState(initial?.name||'');
  const[emoji,setEmoji]=useState(initial?.emoji||'📍');
  const[rating,setRating]=useState(initial?.rating||0);
  const[notes,setNotes]=useState(initial?.notes||'');
  const[photos,setPhotos]=useState(initial?.photos||[]);
  const[busy,setBusy]=useState(false);
  const fileRef=useRef(null);
  const lat=initial?.lat??coord?.lat,lng=initial?.lng??coord?.lng;

  // Yeni yer: adı otomatik doldurmayı dene
  useEffect(()=>{
    if(!initial&&coord&&!name){
      reverseGeocode(coord.lat,coord.lng).then(n=>{if(n)setName(prev=>prev||n);});
    }
  },[]);

  const addPhotos=async(files)=>{
    setBusy(true);
    const arr=[];
    for(const f of files){if(f.type.startsWith('image/')){try{arr.push(await compressImage(f));}catch(e){}}}
    setPhotos(p=>[...p,...arr]);setBusy(false);
  };

  const save=()=>{
    if(!name.trim()){alert('Lütfen bir isim girin.');return;}
    onSave({id:initial?.id||uid(),lat,lng,name:name.trim(),emoji,rating,notes:notes.trim(),photos,
      createdAt:initial?.createdAt||Date.now(),updatedAt:Date.now()});
  };

  return(
    <div className="overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-head">
          <h2>{initial?'Yeri Düzenle':'Yeni Yer Ekle'}</h2>
          <button className="close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="field">
            <label>İsim</label>
            <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="ör. Galata Kulesi" autoFocus/>
            <div className="coord">📌 {Number(lat).toFixed(5)}, {Number(lng).toFixed(5)}</div>
          </div>
          <div className="field">
            <label>İşaret (emoji)</label>
            <div className="emoji-grid">
              {EMOJIS.map(x=>(
                <button key={x.e} className={emoji===x.e?'sel':''} title={x.label}
                  onClick={()=>setEmoji(x.e)}>{x.e}</button>
              ))}
            </div>
          </div>
          <div className="field">
            <label>Puan</label>
            <StarInput value={rating} onChange={setRating}/>
          </div>
          <div className="field">
            <label>Yorum / Notlar</label>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Burası nasıldı? İzlenimlerini yaz…"/>
          </div>
          <div className="field">
            <label>Fotoğraflar</label>
            <div className="photos">
              {photos.map((src,i)=>(
                <div className="ph" key={i}>
                  <img src={src} alt=""/>
                  <button className="del" onClick={()=>setPhotos(p=>p.filter((_,j)=>j!==i))}>×</button>
                </div>
              ))}
              <div className="add" onClick={()=>fileRef.current.click()}>
                <span style={{fontSize:22}}>＋</span>{busy?'Yükleniyor…':'Ekle'}
              </div>
            </div>
            <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}}
              onChange={e=>{addPhotos([...e.target.files]);e.target.value='';}}/>
          </div>
          <div style={{display:'flex',gap:10,marginTop:6}}>
            <button className="btn primary" style={{flex:1}} onClick={save} disabled={busy}>Kaydet</button>
            {initial&&<button className="btn danger" onClick={()=>{if(confirm('Bu yer silinsin mi?'))onDelete(initial.id);}}>Sil</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================ Detay modalı ============================ */
function DetailModal({place,onClose,onEdit,onZoom,onLightbox}){
  return(
    <div className="overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-head">
          <h2>{place.name}</h2>
          <button className="close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="detail-meta">
            <span className="big-emoji">{place.emoji}</span>
            <div>
              <div style={{fontSize:13,color:'var(--dim)'}}>{emojiLabel(place.emoji)}</div>
              {place.rating>0&&<div className="detail-stars">{stars(place.rating)}</div>}
            </div>
          </div>
          <div className="coord">📌 {Number(place.lat).toFixed(5)}, {Number(place.lng).toFixed(5)}</div>
          {place.photos&&place.photos.length>0&&(
            <div className="detail-photos">
              {place.photos.map((src,i)=><img key={i} src={src} alt="" onClick={()=>onLightbox(src)}/>)}
            </div>
          )}
          {place.notes&&<div className="review">{place.notes}</div>}
          <div style={{display:'flex',gap:10,marginTop:16}}>
            <button className="btn primary" style={{flex:1}} onClick={()=>onEdit(place)}>Düzenle</button>
            <button className="btn" onClick={()=>{onZoom(place.id);onClose();}}>Haritada Göster</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================ Giriş ekranı ============================ */
function SignIn({onGoogle,err}){
  const[busy,setBusy]=useState(false);
  return(
    <div className="signin">
      <div className="signin-card">
        <div className="big-logo">🌍</div>
        <h1>Gezgin</h1>
        <p>Gezdiğin yerleri haritada işaretle, puanla, yorum yaz ve fotoğraflarını ekle.
          Her şey Google hesabınla senkronize olur — tüm cihazlarından erişebilirsin.</p>
        <button className="gbtn" disabled={busy} onClick={async()=>{setBusy(true);try{await onGoogle();}catch(e){alert(e.message||e.code);}setBusy(false);}}>
          <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.705 17.64 9.2z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.826.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
          {busy?'Giriş yapılıyor…':'Google ile Giriş Yap'}
        </button>
        {err&&<div className="err">{err}</div>}
        <div className="note">Harita: OpenStreetMap · Senkronizasyon: Firebase</div>
      </div>
    </div>
  );
}

/* ============================ Ana uygulama ============================ */
function App(){
  const[data,setData]=useState(makeDefault());
  const{user,status,authLoading,authErr,signInWithGoogle,signOut}=useCloudSync(data,setData);

  const[adding,setAdding]=useState(null);     // {lat,lng}
  const[editing,setEditing]=useState(null);   // place obj
  const[detail,setDetail]=useState(null);     // place obj
  const[focusId,setFocusId]=useState(null);
  const[flyTo,setFlyTo]=useState(null);
  const[lightbox,setLightbox]=useState(null);
  const[filter,setFilter]=useState('all');
  const[query,setQuery]=useState('');
  const[geoResults,setGeoResults]=useState([]);
  const[sidebarOpen,setSidebarOpen]=useState(false);

  const places=data.places||[];

  const upsert=p=>{
    setData(d=>{
      const arr=(d.places||[]).slice();
      const i=arr.findIndex(x=>x.id===p.id);
      if(i>=0)arr[i]=p;else arr.push(p);
      return{...d,places:arr};
    });
    setAdding(null);setEditing(null);
    setFocusId(p.id);
  };
  const remove=id=>{
    setData(d=>({...d,places:(d.places||[]).filter(x=>x.id!==id)}));
    setEditing(null);setDetail(null);
  };

  // emoji filtreleri (sadece kullanılanlar)
  const usedEmojis=[...new Set(places.map(p=>p.emoji))];
  const filtered=places.filter(p=>{
    if(filter!=='all'&&p.emoji!==filter)return false;
    if(query.trim()){
      const q=query.toLowerCase();
      return (p.name||'').toLowerCase().includes(q)||(p.notes||'').toLowerCase().includes(q);
    }
    return true;
  });

  // arama: önce yerel, eşleşme yoksa geocode öner
  const runSearch=async()=>{
    if(!query.trim()){setGeoResults([]);return;}
    const res=await geocode(query.trim());
    setGeoResults(res);
  };

  const locateMe=()=>{
    if(!navigator.geolocation)return alert('Tarayıcı konumu desteklemiyor.');
    navigator.geolocation.getCurrentPosition(
      pos=>setFlyTo({lat:pos.coords.latitude,lng:pos.coords.longitude,zoom:14,_t:Date.now()}),
      ()=>alert('Konum alınamadı.'),{enableHighAccuracy:true});
  };

  if(authLoading)return(<div className="signin"><div className="signin-card"><div className="big-logo">🌍</div><p>Yükleniyor…</p></div></div>);
  if(!user)return <SignIn onGoogle={signInWithGoogle} err={authErr}/>;

  return(
    <div className="app">
      <div className="topbar">
        <div className="brand"><span className="logo">🌍</span><span className="full">Gezgin</span></div>
        <div className="spacer"/>
        <div className="sync"><span className={'dot '+status}/>{
          status==='synced'?'Senkron':status==='syncing'?'Eşitleniyor…':status==='error'?'Hata':'Çevrimdışı'}</div>
        {user.photoURL&&<img className="avatar" src={user.photoURL} alt="" referrerPolicy="no-referrer"/>}
        <button className="btn ghost sm" onClick={signOut} title="Çıkış">Çıkış</button>
        <button className="btn sm mobile-toggle" onClick={()=>setSidebarOpen(o=>!o)}>☰ {places.length}</button>
      </div>

      <div className="main">
        <MapView places={filtered} focusId={focusId} flyTo={flyTo}
          onMapClick={(lat,lng)=>{setAdding({lat,lng});}}
          onMarkerClick={id=>{const p=places.find(x=>x.id===id);if(p)setDetail(p);}}/>

        <div className="hint">🗺️ Yer eklemek için haritaya dokun</div>
        <div className="fab">
          <button title="Konumum" onClick={locateMe}>🎯</button>
        </div>

        <div className={'sidebar'+(sidebarOpen?' open':'')}>
          <div className="side-head">
            <div className="search">
              <input value={query} onChange={e=>{setQuery(e.target.value);setGeoResults([]);}}
                onKeyDown={e=>{if(e.key==='Enter')runSearch();}}
                placeholder="Yerlerimde ara veya konum bul…"/>
              <button className="btn sm" onClick={runSearch}>🔎</button>
            </div>
            {geoResults.length>0&&(
              <div className="geo-results">
                {geoResults.map((r,i)=>(
                  <div className="gr" key={i} onClick={()=>{
                    setFlyTo({lat:+r.lat,lng:+r.lon,zoom:14,_t:Date.now()});
                    setGeoResults([]);setSidebarOpen(false);
                  }}>📍 {r.display_name}</div>
                ))}
              </div>
            )}
          </div>

          {places.length>0&&(
            <div className="filters">
              <button className={'chip'+(filter==='all'?' active':'')} onClick={()=>setFilter('all')}>Tümü {places.length}</button>
              {usedEmojis.map(e=>(
                <button key={e} className={'chip'+(filter===e?' active':'')} onClick={()=>setFilter(filter===e?'all':e)}>
                  {e} {places.filter(p=>p.emoji===e).length}</button>
              ))}
            </div>
          )}

          <div className="list">
            {filtered.length===0&&(
              <div className="empty">
                {places.length===0
                  ?'Henüz yer eklemedin.\nHaritaya dokunarak ilk yerini ekle! 🗺️'
                  :'Eşleşen yer yok.'}
              </div>
            )}
            {filtered.slice().sort((a,b)=>b.updatedAt-a.updatedAt).map(p=>(
              <div className="card" key={p.id} onClick={()=>setDetail(p)}>
                <div className="row">
                  <div className="emoji">{p.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="nm">{p.name}</div>
                    <div className="cat">{emojiLabel(p.emoji)}</div>
                    {p.rating>0&&<div className="stars">{stars(p.rating)}</div>}
                  </div>
                </div>
                {p.photos&&p.photos.length>0&&(
                  <div className="thumbs">
                    {p.photos.slice(0,4).map((src,i)=><img key={i} src={src} alt=""/>)}
                    {p.photos.length>4&&<div className="more">+{p.photos.length-4}</div>}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>

      {adding&&<PlaceModal coord={adding} onSave={upsert} onClose={()=>setAdding(null)} onDelete={remove}/>}
      {editing&&<PlaceModal initial={editing} onSave={upsert} onClose={()=>setEditing(null)} onDelete={remove}/>}
      {detail&&!editing&&<DetailModal place={places.find(x=>x.id===detail.id)||detail}
        onClose={()=>setDetail(null)}
        onEdit={p=>{setEditing(p);}}
        onZoom={id=>{setFocusId(id);setFlyTo({lat:detail.lat,lng:detail.lng,zoom:15,_t:Date.now()});}}
        onLightbox={src=>setLightbox(src)}/>}
      {lightbox&&(
        <div className="lightbox" onClick={()=>setLightbox(null)}>
          <button className="lb-close">×</button>
          <img src={lightbox} alt=""/>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
